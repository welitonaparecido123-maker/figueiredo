<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Arena Pro</title>
<meta name="theme-color" content="#07101D"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Arena Pro"/>
<link rel="manifest" href="data:application/json,%7B%22name%22%3A%22Arena%20Pro%22%2C%22short_name%22%3A%22Arena%20Pro%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%2307101D%22%2C%22theme_color%22%3A%22%2307101D%22%2C%22start_url%22%3A%22.%22%7D"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07101D;--s1:#0C1825;--s2:#112435;--s3:#162E42;--border:#1C3448;--accent:#00D49A;--aB:rgba(0,212,154,.1);--text:#E0EFF8;--sub:#7BA3BC;--muted:#3D617A;--ok:#20D070;--warn:#F5A623;--danger:#F04444;--blue:#4B9FFF;--purple:#9B72F8;--orange:#FF6535}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;font-size:14px;height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
#app{display:flex;height:100vh}
#sb{width:220px;background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:width .22s;flex-shrink:0;overflow:hidden}
#sb.col{width:64px}
#sbl{padding:16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;white-space:nowrap;cursor:pointer;min-height:68px}
.sball{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#005C42);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden}
.sball img{width:100%;height:100%;object-fit:cover;border-radius:10px}
#sbn{flex:1;padding:8px;overflow-y:auto}
.ni{display:flex;align-items:center;gap:12px;padding:9px 10px;border-radius:8px;cursor:pointer;margin-bottom:2px;color:var(--sub);border-left:2px solid transparent;position:relative;transition:all .15s;white-space:nowrap}
.ni:hover{background:var(--s2)}.ni.on{background:var(--aB);color:var(--accent);border-left-color:var(--accent)}.ni.on .nl{font-weight:600}
.nl{font-size:13px;flex:1}.nb{border-radius:10px;padding:1px 7px;font-size:10px;font-weight:700}
.ndot{position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%}
#sb.col .nl,#sb.col .nb,#sb.col #sbl .sc,#sb.col #sbt span{display:none}
#sb.col .ni{justify-content:center}
#sbt{padding:10px 14px;border-top:1px solid var(--border);cursor:pointer;color:var(--muted);display:flex;align-items:center;gap:8px;font-size:11px}
.chv{transition:transform .2s}#sb:not(.col) .chv{transform:rotate(180deg)}
#mn{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#tb{height:54px;background:var(--s1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0}
#tbt{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px}
#ct{flex:1;overflow-y:auto;overflow-x:hidden;padding:20px}
.tbs{display:flex;align-items:center;gap:8px;background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:6px 12px;width:180px}
.tbs input{background:none;border:none;outline:none;color:var(--text);font-size:12px;flex:1;font-family:inherit}
.bw{position:relative;cursor:pointer}.bdot{position:absolute;top:-3px;right:-3px;width:7px;height:7px;border-radius:50%;background:var(--danger)}
.admbtn{padding:5px 12px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--blue));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;color:#000;transition:all .2s}
.cd{background:var(--s2);border:1px solid var(--border);border-radius:12px}
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.btn{background:var(--aB);color:var(--accent);border:1px solid rgba(0,212,154,.27);border-radius:8px;padding:7px 13px;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-weight:600;white-space:nowrap;font-family:inherit;transition:background .15s}
.btn:hover{background:rgba(0,212,154,.2)}
.btn-d{background:rgba(240,68,68,.1)!important;color:var(--danger)!important;border-color:rgba(240,68,68,.3)!important}
.btn-d:hover{background:rgba(240,68,68,.2)!important}
.btn-b{background:rgba(75,159,255,.1)!important;color:var(--blue)!important;border-color:rgba(75,159,255,.3)!important}
.btn-g{background:rgba(32,208,112,.1)!important;color:var(--ok)!important;border-color:rgba(32,208,112,.3)!important}
.btn-o{background:rgba(255,101,53,.1)!important;color:var(--orange)!important;border-color:rgba(255,101,53,.3)!important}
.bdg{border-radius:6px;padding:3px 8px;font-size:11px;font-weight:600;white-space:nowrap}
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.bb{font-family:'Bebas Neue',sans-serif}
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:18px;flex-wrap:wrap}
.tab{padding:8px 14px;cursor:pointer;font-size:12px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;transition:all .15s;margin-bottom:-1px}
.tab.on{color:var(--accent);border-bottom-color:var(--accent)}
.th{display:grid;padding:10px 16px;background:var(--s3);font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.4px;text-transform:uppercase;border-bottom:1px solid var(--border)}
.tr{display:grid;padding:12px 16px;border-bottom:1px solid var(--border);align-items:center}
.tr:hover{background:rgba(255,255,255,.02)}
.kg{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kg5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:18px}
.g2{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.dtab{padding:8px 12px;border-radius:10px;cursor:pointer;background:var(--s2);border:1px solid var(--border);color:var(--sub);text-align:center;min-width:64px;transition:all .15s}
.dtab.on{background:var(--aB);border-color:var(--accent);color:var(--accent)}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.sl{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:13px;transition:all .15s}
.sl:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.3)}
.cg{display:grid;grid-template-columns:1fr 1.5fr;gap:16px}
.cc{padding:13px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;cursor:pointer;background:var(--s2);transition:all .15s}
.cc.on{background:var(--s3);border-color:var(--accent)}
.ci{display:flex;justify-content:space-between;align-items:center;padding:9px 6px;border-bottom:1px solid var(--border)}
.pg3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.pb{border-radius:10px;padding:11px;text-align:center;cursor:pointer;font-size:12px;font-weight:700;transition:filter .15s;border:1px solid transparent}
.pb:hover{filter:brightness(1.15)}
.pdg{display:grid;grid-template-columns:1.7fr 1fr;gap:16px}
.pg4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.pr{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:13px;cursor:pointer;transition:all .15s;text-align:center}
.pr:hover{border-color:var(--accent);background:var(--s3)}
.sb{display:flex;align-items:center;gap:8px;background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:8px 12px}
.sb input{background:none;border:none;outline:none;color:var(--text);font-size:13px;flex:1;font-family:inherit}
.inp{background:var(--s3);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;font-family:inherit;width:100%;outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--accent)}
.lbl{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.4px;text-transform:uppercase;margin-bottom:5px}
.frow{margin-bottom:12px}.fg{display:grid;gap:12px;margin-bottom:12px}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(3px)}
.modal{background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:24px;width:480px;max-width:96vw;max-height:92vh;overflow-y:auto}
.modal h2{font-family:'Bebas Neue',sans-serif;font-size:24px;margin-bottom:18px;letter-spacing:1px}
.ab{background:rgba(240,68,68,.12);border:1px solid rgba(240,68,68,.27);border-radius:10px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--danger);font-weight:500}
.atb{height:4px;border-radius:2px;background:var(--border)}
.stb{height:6px;border-radius:3px;background:var(--s3);overflow:hidden}
.empty{padding:48px;text-align:center;color:var(--muted)}
.empty .ei{font-size:38px;margin-bottom:10px;opacity:.4}
.empty p{font-size:13px}
.mp{padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;border:1px solid var(--border);color:var(--muted);transition:all .15s}
.qfoto{width:100%;height:90px;object-fit:cover;border-radius:8px;margin-top:8px;display:block}
.conf-item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.conf-total{display:flex;justify-content:space-between;padding:12px 0;margin-top:4px}
#pwa-banner{display:none;position:fixed;bottom:16px;right:16px;background:var(--s1);border:1px solid var(--accent);border-radius:12px;padding:14px 18px;z-index:998;gap:12px;align-items:center;max-width:300px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
#pwa-banner.show{display:flex}
#offline-b{display:none;position:fixed;top:10px;left:50%;transform:translateX(-50%);background:var(--danger);color:#fff;border-radius:20px;padding:4px 14px;font-size:12px;font-weight:600;z-index:1000}
#offline-b.show{display:block}
#booking-page{display:none;min-height:100vh;background:var(--bg);align-items:center;justify-content:center}
#booking-page.show{display:flex}
svg{display:inline-block;vertical-align:middle}
select.inp option{background:var(--s3)}
.thumb{width:28px;height:28px;border-radius:5px;object-fit:cover;cursor:pointer;vertical-align:middle}
@media print{#sb,#tb,#pwa-banner,.btn,button{display:none!important}#ct{overflow:visible;padding:0}body{overflow:visible;height:auto}}
</style>
</head>
<body>
<div id="app">
  <div id="sb">
    <div id="sbl" onclick="nav('config')" title="Config da empresa"></div>
    <div id="sbn"></div>
    <div id="sbt" onclick="toggleSB()">
      <svg class="chv" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      <span>Recolher menu</span>
    </div>
  </div>
  <div id="mn">
    <div id="tb">
      <div id="tbt">Dashboard</div>
      <div style="flex:1"></div>
      <div class="tbs"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input placeholder="Buscar..."/></div>
      <div class="bw"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="var(--sub)" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><div class="bdot"></div></div>
      <div id="admbtn" class="admbtn" onclick="toggleAdmin()">🔒 Admin</div>
    </div>
    <div id="ct"></div>
  </div>
</div>
<div id="pwa-banner">
  <span style="font-size:22px">📲</span>
  <div style="flex:1"><div style="font-weight:600;font-size:13px">Instalar Arena Pro</div><div style="font-size:11px;color:var(--muted)">Adicionar à tela inicial</div></div>
  <button class="btn" id="pwabtn" style="padding:6px 12px">Instalar</button>
  <span onclick="document.getElementById('pwa-banner').classList.remove('show')" style="cursor:pointer;color:var(--muted);font-size:18px;padding:0 4px">×</span>
</div>
<div id="offline-b">📵 Offline</div>
<div id="modal-root"></div>
<div id="booking-page"></div>

// ══ BAR CHART ══════════════════════════════════
function barChart(data){
  if(!data||!data.length)return`<div style="height:140px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px">Sem dados</div>`;
  const W=520,H=145,pL=42,pB=24,pR=8,pT=8,cW=W-pL-pR,cH=H-pB-pT;
  const maxV=Math.max(...data.map(d=>d.v),1);
  const mag=Math.pow(10,Math.floor(Math.log10(maxV)));
  const yMax=Math.ceil(maxV/mag)*mag;
  const bW=Math.floor(cW/data.length*.5),gap=cW/data.length;
  let o=`<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" style="display:block">`;
  for(let i=0;i<=4;i++){const yv=yMax/4*i,y=pT+cH*(1-yv/yMax);o+=`<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="var(--border)" stroke-width="1"/><text x="${pL-4}" y="${y+4}" text-anchor="end" fill="var(--muted)" font-size="10" font-family="DM Sans,sans-serif">${yv>=1000?(yv/1000).toFixed(1).replace('.0','')+'k':yv}</text>`;}
  data.forEach((d,i)=>{const x=pL+i*gap+(gap-bW)/2,bH=Math.max(3,cH*d.v/yMax),y=pT+cH-bH;o+=`<rect x="${x}" y="${y}" width="${bW}" height="${bH}" rx="3" fill="${D.empresa.corPrimaria||'#00D49A'}" opacity=".9"><title>${d.d}: R$ ${d.v}</title></rect><text x="${x+bW/2}" y="${H-5}" text-anchor="middle" fill="var(--muted)" font-size="11" font-family="DM Sans,sans-serif">${d.d}</text>`;});
  return o+`</svg>`;
}

function requireAdmin(cb){
  if(S.isAdmin){cb();return;}
  S.pendingAction=cb;
  showModal(`<div class="modal"><h2>🔐 PERMISSÃO</h2>
    <p style="color:var(--sub);margin-bottom:14px;font-size:13px">Ação requer senha do administrador.</p>
    <div class="frow"><div class="lbl">Senha Admin</div><input class="inp" id="piinp" type="password" placeholder="••••" onkeydown="if(event.key==='Enter')checkPin()"/></div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn" style="flex:1;justify-content:center" onclick="checkPin()">Confirmar</button>
      <button class="btn btn-d" onclick="closeModal()">Cancelar</button>
    </div>
  </div>`);
  setTimeout(()=>{const e=document.getElementById('piinp');if(e)e.focus();},80);
}
function checkPin(){
  const v=document.getElementById('piinp')?.value;
  if(v===D.empresa.adminPin){closeModal();if(S.pendingAction){S.pendingAction();S.pendingAction=null;}}
  else alert('Senha incorreta.');
}
function toggleAdmin(){
  if(S.isAdmin){S.isAdmin=false;renderSidebar();render();}
  else{
    S.pendingAction=()=>{S.isAdmin=true;renderSidebar();render();};
    showModal(`<div class="modal"><h2>🔐 LOGIN ADMIN</h2>
      <div class="frow"><div class="lbl">Senha</div><input class="inp" id="piinp" type="password" placeholder="••••" onkeydown="if(event.key==='Enter')checkPin()"/></div>
      <div style="display:flex;gap:10px;margin-top:16px">
        <button class="btn" style="flex:1;justify-content:center" onclick="checkPin()">Entrar</button>
        <button class="btn btn-d" onclick="closeModal()">Cancelar</button>
      </div>
    </div>`);
    setTimeout(()=>{const e=document.getElementById('piinp');if(e)e.focus();},80);
  }
}

// ══ AGENDA ═════════════════════════════════════
function sAgenda(){
  const mC={normal:'var(--ok)',dayuse:'var(--warn)',fechado:'var(--danger)'};
  const mL={normal:'Normal',dayuse:'Day Use',fechado:'Fechado'};
  const cur=DAYS[S.agDay];
  const dayMode=D.dayModes[cur]||'normal';
  const now=new Date(),dow=now.getDay();
  const selDate=new Date(now);selDate.setDate(now.getDate()+(DIIDX[cur]-dow));
  const selStr=selDate.toISOString().slice(0,10);

  // Determinar modo efetivo: se quadra selecionada usa modo da quadra, senão usa modo do dia
  const selQ=S.agQuadra!=='all'?D.quadras.find(q=>String(q.id)===String(S.agQuadra)):null;
  const effectiveMode=selQ?(selQ.mode||'normal'):dayMode;

  let daySlots=D.slots.filter(s=>s.date===selStr).sort((a,b)=>a.time.localeCompare(b.time));
  if(S.agQuadra!=='all')daySlots=daySlots.filter(s=>String(s.quadraId)===String(S.agQuadra));
  const aulasDia=D.aulaFixas.filter(af=>af.diasSemana&&af.diasSemana.includes(cur));
  const sc={livre:'var(--ok)',reservado:'var(--warn)',pago:'var(--blue)',bloqueado:'var(--danger)'};

  const qOpts=`<option value="all">Todas as Quadras</option>${D.quadras.map(q=>`<option value="${q.id}" ${S.agQuadra==q.id?'selected':''}>${esc(q.nome)} — ${mL[q.mode||'normal']}</option>`).join('')}`;
  return`
  <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center">
    ${DAYS.map((d,i)=>`<div class="dtab${S.agDay===i?' on':''}" onclick="S.agDay=${i};render()">
      <div style="font-weight:600;font-size:12px">${d}</div>
      <div style="font-size:10px;color:${mC[D.dayModes[d]]||'var(--ok)'};margin-top:2px">●</div>
    </div>`).join('')}
    <div style="margin-left:auto;display:flex;gap:6px;align-items:center;flex-wrap:wrap">
      ${D.quadras.length?`<select class="inp" style="width:auto;padding:5px 10px;font-size:12px" onchange="S.agQuadra=this.value;render()">${qOpts}</select>`:''}
    </div>
  </div>

  <!-- Modo do dia / quadra selecionada -->
  <div style="display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap">
    <span style="font-size:12px;color:var(--muted)">${selQ?`Modo da ${esc(selQ.nome)}:`:'Modo do dia:'}</span>
    ${['normal','dayuse','fechado'].map(m=>`<div class="mp" style="${effectiveMode===m?`background:${mC[m]}18;border-color:${mC[m]}55;color:${mC[m]}`:'color:var(--muted)'}" onclick="${selQ?`setQuadraMode(${selQ.id},'${m}')`:`setMode('${cur}','${m}')`}">${mL[m]}</div>`).join('')}
    ${selQ?`<span style="font-size:11px;color:var(--muted);margin-left:4px">(modo individual desta quadra)</span>`:'<span style="font-size:11px;color:var(--muted);margin-left:4px">(afeta todos os horários do dia)</span>'}
  </div>

  ${effectiveMode==='fechado'
    ?`<div class="cd" style="padding:60px;text-align:center">${I.lock}<div style="font-size:18px;font-weight:700;margin:14px 0 6px;color:var(--danger)">${selQ?esc(selQ.nome)+' Fechada':'Arena Fechada'}</div><div style="font-size:12px;color:var(--muted)">Marcado como fechado.</div></div>`
    :`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
        <span style="font-size:12px;color:var(--muted)">${fmtD(selStr)} · ${daySlots.length} slot(s) · ${aulasDia.length} aula(s) fixa(s)</span>
        <div style="display:flex;gap:8px">

function setMode(d,m){D.dayModes[d]=m;save('dayModes');render();}
function setQuadraMode(qid,m){const q=D.quadras.find(x=>x.id===qid);if(q){q.mode=m;save('quadras');render();}}

function openModalSlot(date,sl=null){
  const qOpts=D.quadras.map(q=>`<option value="${q.id}" ${sl&&sl.quadraId===q.id?'selected':''}>${esc(q.nome)}</option>`).join('');
  showModal(`<div class="modal"><h2>${sl?'EDITAR':'NOVO'} HORÁRIO</h2>
    <div class="fg" style="grid-template-columns:1fr 1fr">
      <div><div class="lbl">Início</div><input class="inp" id="mst" type="time" value="${sl?sl.time:'08:00'}"/></div>
      <div><div class="lbl">Fim</div><input class="inp" id="mse" type="time" value="${sl?sl.end:'09:00'}"/></div>
    </div>
    <div class="frow"><div class="lbl">Cliente</div><input class="inp" id="msc" value="${esc(sl?sl.client||'':'')}" placeholder="Nome do cliente" list="msclist"/><datalist id="msclist">${D.clientes.map(c=>`<option value="${esc(c.name)}">`).join('')}</datalist></div>
    ${D.quadras.length?`<div class="frow"><div class="lbl">Quadra</div><select class="inp" id="msq"><option value="">— Sem quadra —</option>${qOpts}</select></div>`:''}
    <div class="fg" style="grid-template-columns:1fr 1fr 1fr">
      <div><div class="lbl">Status</div><select class="inp" id="mss">${['livre','reservado','pago','bloqueado'].map(s=>`<option value="${s}" ${sl&&sl.status===s?'selected':''}>${BM[s]?.l||s}</option>`).join('')}</select></div>
      <div><div class="lbl">Preço R$/h</div><input class="inp" id="msp" type="number" min="0" value="${sl?sl.price||0:0}" oninput="calcDesc()"/></div>
      <div><div class="lbl">Duração (h)</div><input class="inp" id="msd" type="number" min="1" max="12" value="${sl?sl.duracaoH||1:1}" oninput="calcDesc()"/></div>
    </div>
    <div id="descprev" style="font-size:12px;color:var(--ok);min-height:18px;margin-bottom:8px"></div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn" style="flex:1;justify-content:center" onclick="saveSlot('${date}',${sl?sl.id:null})">Salvar</button>
      <button class="btn btn-d" onclick="closeModal()">Cancelar</button>
    </div>
  </div>`);
  setTimeout(calcDesc,60);
}
function calcDesc(){
  const el=document.getElementById('descprev');if(!el)return;
  const h=parseFloat(document.getElementById('msd')?.value)||1;
  const p=parseFloat(document.getElementById('msp')?.value)||0;
  const d=D.descontos.filter(x=>h>=x.horasMin).sort((a,b)=>b.horasMin-a.horasMin)[0];
  if(d&&p>0){el.textContent=`🏷️ Desconto ${d.descontoPct}% (acima de ${d.horasMin}h) → R$ ${fmt2(p*h*(1-d.descontoPct/100))}`;}
  else el.textContent='';
}
function saveSlot(date,eid){
  const time=document.getElementById('mst').value,end=document.getElementById('mse').value;
  if(!time||!end){alert('Preencha os horários.');return;}
  const client=document.getElementById('msc').value.trim();
  const status=document.getElementById('mss').value;
  const basePrice=parseFloat(document.getElementById('msp').value)||0;
  const dh=parseFloat(document.getElementById('msd')?.value)||1;
  const qEl=document.getElementById('msq');
  const quadraId=qEl&&qEl.value?parseInt(qEl.value):null;
  const disc=D.descontos.filter(x=>dh>=x.horasMin).sort((a,b)=>b.horasMin-a.horasMin)[0];
  const price=disc?basePrice*(1-disc.descontoPct/100):basePrice;
  const obj={time,end,client,status,price,duracaoH:dh,quadraId,date};
  if(eid){const i=D.slots.findIndex(s=>s.id===eid);if(i>-1)D.slots[i]={...D.slots[i],...obj};}
  else D.slots.push({id:_id(),...obj});
  save('slots');closeModal();render();
}
function editSlot(sid){const s=D.slots.find(x=>x.id===sid);if(s)openModalSlot(s.date,s);}
function delSlot(sid){if(confirm('Remover horário?')){D.slots=D.slots.filter(s=>s.id!==sid);save('slots');render();}}
function openModalQuadra(qid=null){

      <div style="display:flex;gap:8px" id="mqmode">
        ${['normal','dayuse','fechado'].map(m=>`<div class="mp" id="mqm-${m}" style="${(q?q.mode||'normal':'normal')===m?`background:${mC[m]}18;border-color:${mC[m]}55;color:${mC[m]}`:'color:var(--muted)'}" onclick="selectQMode('${m}')">${m.charAt(0).toUpperCase()+m.slice(1)}</div>`).join('')}

function selectQMode(m){
  const mC={normal:'var(--ok)',dayuse:'var(--warn)',fechado:'var(--danger)'};
  ['normal','dayuse','fechado'].forEach(x=>{
    const el=document.getElementById('mqm-'+x);
    if(el)el.style.cssText=x===m?`background:${mC[m]}18;border-color:${mC[m]}55;color:${mC[m]};border:1px solid;padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer`:`color:var(--muted);border:1px solid var(--border);padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer`;
  });
  const v=document.getElementById('mqmval');if(v)v.value=m;
}
function prevQFoto(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>document.getElementById('mqfprev').innerHTML=`<img src="${e.target.result}" class="qfoto"/>`;r.readAsDataURL(f);}
function saveQuadra(eid){
  const nome=document.getElementById('mqn').value.trim();if(!nome){alert('Nome obrigatório.');return;}
  const descricao=document.getElementById('mqd').value.trim();
  const mode=document.getElementById('mqmval')?.value||'normal';
  const fotoEl=document.getElementById('mqfprev')?.querySelector('img');
  const foto=fotoEl?fotoEl.src:(eid?D.quadras.find(q=>q.id===eid)?.foto:null);
  if(eid){const i=D.quadras.findIndex(q=>q.id===eid);if(i>-1)D.quadras[i]={...D.quadras[i],nome,descricao,foto,mode};}
  else D.quadras.push({id:_id(),nome,descricao,foto,mode});
  save('quadras');closeModal();render();
}
function delQuadra(qid){if(confirm('Excluir quadra?')){D.quadras=D.quadras.filter(q=>q.id!==qid);save('quadras');closeModal();render();}}

function openModalComanda(){

          <div><div class="lbl">R$ por Pessoa</div><input class="inp" id="du-price" type="number" min="0" step="0.01" value="${D.empresa.dayUsePrice||0}" oninput="calcDayUseTotal()"/></div>

function toggleDayUseFields(v){const el=document.getElementById('dayuse-fields');if(el)el.style.display=v==='dayuse'?'block':'none';}
function calcDayUseTotal(){
  const q=parseInt(document.getElementById('du-qty')?.value)||1;
  const p=parseFloat(document.getElementById('du-price')?.value)||0;
  const el=document.getElementById('du-total');
  if(el)el.textContent=`Total Day Use: R$ ${fmt2(q*p)}`;
}
function saveComanda(){
  const client=document.getElementById('mcc').value.trim();if(!client){alert('Informe o cliente.');return;}
  const type=document.getElementById('mct').value;
  const cmd={id:_id(),client,type,since:nowTime(),items:[],closed:false};
  // Se Day Use, lança automaticamente o item de entrada
  if(type==='dayuse'){
    const qty=parseInt(document.getElementById('du-qty')?.value)||1;
    const price=parseFloat(document.getElementById('du-price')?.value)||0;
    if(price>0) cmd.items.push({n:`Entrada Day Use (${qty} pessoa${qty>1?'s':''})`,q:1,p:price*qty});
  }
  D.comandas.push(cmd);
  save('comandas');closeModal();S.selCmd=D.comandas.filter(c=>!c.closed).length-1;render();
}
function openModalAddItem(cid){
  const pOpts=D.estoque.filter(e=>e.price>0||e.qty>0).map(p=>`<option value="${p.id}">${esc(p.nome)} — R$ ${fmt2(p.price)}</option>`).join('');
  showModal(`<div class="modal"><h2>ADICIONAR ITEM</h2>
    ${D.estoque.filter(e=>e.price>0).length?`<div class="frow"><div class="lbl">Produto do Bar/PDV</div><select class="inp" id="maip" onchange="fillItemFromProd(this.value)"><option value="">— selecionar produto —</option>${pOpts}</select></div>`:''}
    <div class="frow"><div class="lbl">Nome do item</div><input class="inp" id="main" placeholder="Ex: Heineken LN"/></div>
    <div class="fg" style="grid-template-columns:1fr 1fr">
      <div><div class="lbl">Quantidade</div><input class="inp" id="maiq" type="number" min="1" value="1"/></div>
      <div><div class="lbl">Preço unit. R$</div><input class="inp" id="maiv" type="number" min="0" step="0.01" value="0"/></div>
    </div>
    <div style="display:flex;gap:10px;margin-top:18px">
      <button class="btn" style="flex:1;justify-content:center" onclick="saveItemComanda(${cid})">Adicionar</button>
      <button class="btn btn-d" onclick="closeModal()">Cancelar</button>
    </div>
  </div>`);
}
function fillItemFromProd(pid){const p=D.estoque.find(x=>x.id==pid);if(p){document.getElementById('main').value=p.nome;document.getElementById('maiv').value=p.price;}}
function saveItemComanda(cid){
  const name=document.getElementById('main').value.trim(),q=parseInt(document.getElementById('maiq').value)||1,p=parseFloat(document.getElementById('maiv').value)||0;
  if(!name){alert('Informe o nome.');return;}
  const cmd=D.comandas.find(c=>c.id===cid);if(!cmd)return;
  const ex=cmd.items.find(i=>i.n===name);if(ex)ex.q+=q;else cmd.items.push({n:name,q,p});
  // baixa estoque se produto cadastrado
  const pEl=document.getElementById('maip');
  if(pEl&&pEl.value){const ep=D.estoque.find(e=>e.id==pEl.value);if(ep){ep.qty=Math.max(0,ep.qty-q);save('estoque');}}
  save('comandas');closeModal();render();
}
function iniciarPgtoComanda(cid){
  const cmd=D.comandas.find(c=>c.id===cid);if(!cmd)return;
  if(!cmd.items.length){alert('Comanda sem itens.');return;}
  const total=cmd.items.reduce((s,i)=>s+i.q*i.p,0);
  confirmOrder(cmd.items,total,(pay)=>{
    if(total>0){D.txns.push({id:_id(),desc:`Comanda — ${cmd.client}`,v:total,type:'in',pay,time:nowTime(),date:today()});save('txns');}
    cmd.closed=true;save('comandas');S.selCmd=0;render();
  },'FECHAR COMANDA');
}
function delComanda(cid){const c=D.comandas.find(x=>x.id===cid);if(c){c.closed=true;save('comandas');S.selCmd=0;render();}}

        ${S.cartCmd
          ?`<button class="btn" style="width:100%;justify-content:center;padding:11px" onclick="confirmAddToComanda()">➕ Confirmar e Add. à Comanda</button>`

function addCart(pid){
  const p=D.estoque.find(x=>x.id===pid);if(!p)return;
  // id único baseado no pid do estoque
  const e=S.cart.find(x=>x.id===pid);if(e)e.q++;else S.cart.push({id:pid,nome:p.nome,emoji:p.emoji,price:p.price,q:1});
  render();
}
function remCart(pid){S.cart=S.cart.filter(x=>x.id!==pid);render();}
function setProdQ(v){S.prodQ=v;document.getElementById('ct').innerHTML=sPDV();const el=document.getElementById('pqinp');if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length);}}

function confirmarPDV(){
  if(!S.cart.length){alert('Carrinho vazio.');return;}
  const total=S.cart.reduce((s,i)=>s+i.q*i.price,0);
  const items=S.cart.map(it=>({n:it.nome,q:it.q,p:it.price}));
  confirmOrder(items,total,(pay)=>{
    S.cart.forEach(ci=>{const e=D.estoque.find(x=>x.id===ci.id);if(e)e.qty=Math.max(0,e.qty-ci.q);});
    D.txns.push({id:_id(),desc:`PDV — ${S.cart.map(i=>i.nome).join(', ')}`,v:total,type:'in',pay,time:nowTime(),date:today()});
    save('txns');save('estoque');S.cart=[];render();
  });
}
function confirmAddToComanda(){
  if(!S.cart.length){alert('Carrinho vazio.');return;}
  const cmd=D.comandas.find(c=>c.id===S.cartCmd&&!c.closed);
  if(!cmd){alert('Comanda não encontrada.');return;}
  const total=S.cart.reduce((s,i)=>s+i.q*i.price,0);
  const items=S.cart.map(it=>({n:it.nome,q:it.q,p:it.price}));
  S.pendingAction=()=>{
    S.cart.forEach(ci=>{
      const ex=cmd.items.find(i=>i.n===ci.nome);if(ex)ex.q+=ci.q;else cmd.items.push({n:ci.nome,q:ci.q,p:ci.price});
      const ep=D.estoque.find(e=>e.id===ci.id);if(ep)ep.qty=Math.max(0,ep.qty-ci.q);
    });
    save('comandas');save('estoque');S.cart=[];S.cartCmd=null;
    alert(`✅ Adicionado à comanda de ${cmd.client}`);render();
  };
  // Mostra confirmação sem pedir pagamento
  showModal(`<div class="modal"><h2>CONFIRMAR LANÇAMENTO</h2>
    <div style="font-size:13px;color:var(--sub);margin-bottom:12px">Adicionar à comanda de <strong>${esc(cmd.client)}</strong></div>
    ${items.map(it=>`<div class="conf-item"><span>${esc(it.n)} × ${it.q}</span><span style="font-weight:600">R$ ${fmt2(it.p*it.q)}</span></div>`).join('')}
    <div class="conf-total"><span class="bb" style="font-size:18px">TOTAL</span><span class="bb" style="font-size:22px;color:var(--accent)">R$ ${fmt2(total)}</span></div>
    <div style="display:flex;gap:10px;margin-top:14px">
      <button class="btn" style="flex:1;justify-content:center" onclick="closeModal();if(S.pendingAction){S.pendingAction();S.pendingAction=null;}">✅ Confirmar</button>
      <button class="btn btn-d" onclick="closeModal()">Cancelar</button>
    </div>
  </div>`);
}

function sFinanceiro(){

  return`<div class="tabs">

function finLanc(){
  let txns=[...D.txns].sort((a,b)=>b.date.localeCompare(a.date)||b.time.localeCompare(a.time));
  if(S.finFrom)txns=txns.filter(t=>t.date>=S.finFrom);
  if(S.finTo)txns=txns.filter(t=>t.date<=S.finTo);

  const bruto=txns.filter(t=>t.type==='in').reduce((s,t)=>s+t.v,0);
  const saidas=txns.filter(t=>t.type==='out').reduce((s,t)=>s+t.v,0);
  const despFixasMes=D.despFixas.filter(d=>d.ativa).reduce((s,d)=>s+(d.valor||0),0);
  const liquido=bruto-saidas-despFixasMes;
  const pi={pix:'📱',dinheiro:'💵',cartao:'💳'};
  return`
  <div class="kg5" style="margin-bottom:14px">
    ${[
      {l:'Faturamento Bruto',v:`R$ ${bruto.toFixed(2)}`,c:'var(--ok)',i:'📈'},
      {l:'Saídas (período)',v:`R$ ${saidas.toFixed(2)}`,c:'var(--danger)',i:'📤'},
      {l:'Despesas Fixas/mês',v:`R$ ${despFixasMes.toFixed(2)}`,c:'var(--warn)',i:'🏢'},
      {l:'Faturamento Líquido',v:`R$ ${liquido.toFixed(2)}`,c:liquido>=0?'var(--accent)':'var(--danger)',i:'💡'},
      {l:'Transações',v:`${txns.length}`,c:'var(--blue)',i:'🔢'},
    ].map(k=>`<div class="cd" style="padding:14px"><div style="font-size:18px;margin-bottom:6px">${k.i}</div><div class="bb" style="font-size:20px;color:${k.c};line-height:1">${k.v}</div><div style="font-size:10px;color:var(--muted);margin-top:4px">${k.l}</div></div>`).join('')}
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center">
    <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)">

      <div style="flex:1">
        <div style="font-size:13px;font-weight:500">${esc(t.desc)}</div>
        <div style="font-size:11px;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap">
          <span>${fmtD(t.date)} ${t.time}</span>
          <span>${pi[t.pay]||''} ${t.pay}</span>

        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        ${t.comprovante?`<img src="${t.comprovante}" class="thumb" onclick="viewComprovante('${t.id}')" title="Ver comprovante"/>`:''}

  </div>`:empty('Nenhum lançamento.')}`;
}
function finDesp(){

    <div class="cd" style="padding:14px 20px"><div class="bb" style="font-size:24px;color:var(--danger)">R$ ${total.toFixed(2)}</div><div style="font-size:11px;color:var(--muted)">Total mensal (ativas)</div></div>
    <button class="btn" onclick="openModalDesp()">${I.plus} Nova Despesa Fixa</button>
  </div>
  ${D.despFixas.length?`<div class="cd" style="overflow:hidden">
    <div class="th" style="grid-template-columns:2fr 1fr .9fr .7fr 80px 60px">${['Nome','Categoria','Valor','Venc.','Status',''].map(h=>`<span>${h}</span>`).join('')}</div>
    ${D.despFixas.map(d=>`<div class="tr" style="grid-template-columns:2fr 1fr .9fr .7fr 80px 60px">
      <div><div style="font-size:13px;font-weight:600">${esc(d.nome)}</div></div>
      <span style="font-size:12px;color:var(--sub)">${esc(d.categoria)}</span>
      <span class="bb" style="font-size:18px;color:var(--danger)">R$${(d.valor||0).toFixed(0)}</span>
      <span style="font-size:12px;color:var(--muted)">Dia ${d.diaVenc||1}</span>
      <span style="background:${d.ativa?'rgba(32,208,112,.18)':'rgba(61,97,122,.18)'};color:${d.ativa?'var(--ok)':'var(--muted)'};border-radius:6px;padding:3px 8px;font-size:11px;font-weight:600;cursor:pointer" onclick="toggleDesp(${d.id})">${d.ativa?'Ativa':'Inativa'}</span>
      ${actBtns(`openModalDesp(${d.id})`,`delDesp(${d.id})`)}

  </div>`:empty('Nenhuma despesa fixa.',`<button class="btn" onclick="openModalDesp()">${I.plus} Cadastrar</button>`)}`;
}
function openModalTxn(type){
  const dOpts=D.despFixas.map(d=>`<option value="${esc(d.nome)}">${esc(d.nome)} — R$${(d.valor||0).toFixed(2)}</option>`).join('');
  showModal(`<div class="modal"><h2>NOVA ${type==='in'?'ENTRADA':'SAÍDA'}</h2>
    <div class="frow"><div class="lbl">Descrição</div><input class="inp" id="mtd" placeholder="Ex: Reserva João"/></div>
    <div class="fg" style="grid-template-columns:1fr 1fr 1fr">
      <div><div class="lbl">Valor R$</div><input class="inp" id="mtv" type="number" min="0" step="0.01" value="0"/></div>
      <div><div class="lbl">Forma</div><select class="inp" id="mtp"><option value="pix">📱 Pix</option><option value="dinheiro">💵 Dinheiro</option><option value="cartao">💳 Cartão</option></select></div>
      <div><div class="lbl">Data</div><input class="inp" id="mtdt" type="date" value="${today()}"/></div>
    </div>
    ${type==='out'?`
    <div class="frow"><div class="lbl">Motivo / Referência</div>
      <select class="inp" id="mtmtipo" onchange="fillMotivoDesc(this.value)" style="margin-bottom:8px">
        <option value="">— outros (campo livre) —</option>
        ${dOpts}
      </select>
      <input class="inp" id="mtmotivo" placeholder="Descreva o motivo da saída..."/>
    </div>
    <div class="frow"><div class="lbl">Comprovante (foto/imagem)</div>
      <input type="file" id="mtcomp" accept="image/*" style="font-size:12px;color:var(--sub)"/>
    </div>`:''}
    <div style="display:flex;gap:10px;margin-top:18px">
      <button class="btn" style="flex:1;justify-content:center" onclick="saveTxn('${type}')">Registrar</button>
      <button class="btn btn-d" onclick="closeModal()">Cancelar</button>
    </div>
  </div>`);
}
function fillMotivoDesc(v){const el=document.getElementById('mtmotivo');if(el&&v)el.value=v;}
function saveTxn(type){
  const desc=document.getElementById('mtd').value.trim();if(!desc){alert('Descrição obrigatória.');return;}
  const v=parseFloat(document.getElementById('mtv').value)||0;
  const pay=document.getElementById('mtp').value;
  const date=document.getElementById('mtdt').value||today();
  const motivo=document.getElementById('mtmotivo')?.value.trim()||'';
  const obj={id:_id(),desc,v,type,pay,time:nowTime(),date,motivo};
  // comprovante
  const compFile=document.getElementById('mtcomp')?.files[0];
  if(compFile){
    const r=new FileReader();
    r.onload=e=>{obj.comprovante=e.target.result;D.txns.push(obj);save('txns');closeModal();render();};
    r.readAsDataURL(compFile);
  }else{D.txns.push(obj);save('txns');closeModal();render();}
}
function viewComprovante(tid){
  const t=D.txns.find(x=>x.id==tid);if(!t||!t.comprovante)return;
  showModal(`<div class="modal"><h2>COMPROVANTE</h2>
    <div style="font-size:13px;color:var(--sub);margin-bottom:10px">${esc(t.desc)} — ${fmtD(t.date)}</div>
    <img src="${t.comprovante}" style="width:100%;border-radius:10px;max-height:400px;object-fit:contain"/>
    <button class="btn btn-d" style="width:100%;justify-content:center;margin-top:14px" onclick="closeModal()">Fechar</button>
  </div>`);
}
function delTxn(id){if(confirm('Excluir?')){D.txns=D.txns.filter(t=>t.id!==id);save('txns');render();}}
function openModalDesp(did=null){
  const d=did?D.despFixas.find(x=>x.id===did):null;
  const cOpts=DCATS.map(c=>`<option value="${c}" ${d&&d.categoria===c?'selected':''}>${c}</option>`).join('');
  showModal(`<div class="modal"><h2>${d?'EDITAR':'NOVA'} DESPESA FIXA</h2>
    <div class="frow"><div class="lbl">Nome</div><input class="inp" id="dfn" value="${esc(d?d.nome:'')}" placeholder="Ex: Aluguel do espaço"/></div>
    <div class="fg" style="grid-template-columns:1fr 1fr">
      <div><div class="lbl">Categoria</div><select class="inp" id="dfc">${cOpts}</select></div>
      <div><div class="lbl">Valor R$</div><input class="inp" id="dfv" type="number" min="0" step="0.01" value="${d?d.valor||0:0}"/></div>
    </div>
    <div class="fg" style="grid-template-columns:1fr 1fr">
      <div><div class="lbl">Dia de vencimento</div><input class="inp" id="dfd" type="number" min="1" max="31" value="${d?d.diaVenc||1:1}"/></div>
      <div style="display:flex;align-items:flex-end;padding-bottom:4px"><label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px"><input type="checkbox" id="dfa" ${!d||d.ativa?'checked':''} style="accent-color:var(--accent)"/> Ativa</label></div>
    </div>
    <div style="display:flex;gap:10px;margin-top:18px">
      <button class="btn" style="flex:1;justify-content:center" onclick="saveDesp(${did||null})">Salvar</button>
      ${d?`<button class="btn btn-d" onclick="${S.isAdmin?`delDesp(${d.id});closeModal()`:`requireAdmin(()=>{delDesp(${d.id});closeModal()})`}">Excluir</button>`:''}
      <button class="btn btn-d" onclick="closeModal()">Cancelar</button>
    </div>
  </div>`);
}
function saveDesp(eid){
  const nome=document.getElementById('dfn').value.trim();if(!nome){alert('Nome obrigatório.');return;}
  const obj={nome,categoria:document.getElementById('dfc').value,valor:parseFloat(document.getElementById('dfv').value)||0,diaVenc:parseInt(document.getElementById('dfd').value)||1,ativa:document.getElementById('dfa').checked};
  if(eid){const i=D.despFixas.findIndex(x=>x.id===eid);if(i>-1)D.despFixas[i]={...D.despFixas[i],...obj};}
  else D.despFixas.push({id:_id(),...obj});
  save('despFixas');closeModal();render();
}
function toggleDesp(id){const d=D.despFixas.find(x=>x.id===id);if(d){d.ativa=!d.ativa;save('despFixas');render();}}
function delDesp(id){if(confirm('Excluir?')){D.despFixas=D.despFixas.filter(x=>x.id!==id);save('despFixas');render();}}

// ══ ESTOQUE (UNIFICADO) ═════════════════════════
// D.estoque é a fonte única: qty+min+cost = estoque | emoji+descricao+price = PDV
function sEstoque(){
  const alerts=D.estoque.filter(s=>s.qty<=(s.min||0));
  return`
  ${alerts.length?`<div class="ab">${I.alert} Estoque baixo: ${alerts.map(i=>esc(i.nome)).join(' · ')}</div>`:''}
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <div style="font-size:12px;color:var(--muted)">Gerencie aqui o estoque e o catálogo de produtos do Bar/PDV em um só lugar.</div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-b" onclick="openModalEntrada()">${I.plus} Entrada de Mercadoria</button>
      <button class="btn" onclick="openModalProdutoEst()">${I.plus} Novo Produto</button>
    </div>
  </div>
  ${D.estoque.length?`<div class="cd" style="overflow:hidden">
    <div class="th" style="grid-template-columns:.4fr 2.2fr .6fr .6fr .8fr .9fr 1fr 90px 60px">${['','Produto','Qtd','Mín','Custo','Venda','Nível','Status',''].map(h=>`<span>${h}</span>`).join('')}</div>
    ${D.estoque.map(item=>{
      const low=item.qty<=(item.min||0);
      const pct=Math.min(100,(item.min||0)?item.qty/((item.min||0)*2)*100:100);
      return`<div class="tr" style="grid-template-columns:.4fr 2.2fr .6fr .6fr .8fr .9fr 1fr 90px 60px">
        <span style="font-size:20px">${item.emoji||'📦'}</span>
        <div><div style="font-size:13px;font-weight:500">${esc(item.nome)}</div>${item.descricao?`<div style="font-size:10px;color:var(--muted)">${esc(item.descricao)}</div>`:''}</div>
        <span class="bb" style="font-size:17px;color:${low?'var(--danger)':'var(--text)'}">${item.qty}</span>
        <span style="font-size:12px;color:var(--muted)">${item.min||0}</span>
        <span style="font-size:12px">R$${fmt2(item.cost)}</span>
        <span style="font-size:12px;color:${item.price>0?'var(--accent)':'var(--muted)'}">R$${fmt2(item.price)}</span>
        <div style="padding-right:10px"><div class="stb"><div style="height:100%;border-radius:3px;background:${low?'var(--danger)':pct>60?'var(--ok)':'var(--warn)'};width:${pct}%"></div></div></div>
        <span style="background:${low?'rgba(240,68,68,.2)':'rgba(32,208,112,.2)'};color:${low?'var(--danger)':'var(--ok)'};border-radius:6px;padding:3px 8px;font-size:11px;font-weight:600">${low?'⚠ Baixo':'✓ OK'}</span>
        ${actBtns(`openModalProdutoEst(${item.id})`,`delEstItem(${item.id})`)}
      </div>`;
    }).join('')}
  </div>`:empty('Nenhum produto. Clique em "Novo Produto" para começar.')}`;
}
// Entrada de mercadoria — seleciona de produto existente
function openModalEntrada(){
  const pOpts=D.estoque.map(p=>`<option value="${p.id}">${esc(p.nome)}</option>`).join('');
  if(!D.estoque.length){alert('Cadastre ao menos um produto antes de registrar entrada.');openModalProdutoEst();return;}
  showModal(`<div class="modal"><h2>ENTRADA DE MERCADORIA</h2>
    <div class="frow"><div class="lbl">Produto</div><select class="inp" id="meprod" onchange="fillEntrada(this.value)"><option value="">— selecionar produto —</option>${pOpts}</select></div>
    <div class="frow" id="me-info" style="display:none">
      <div style="background:var(--s3);border:1px solid var(--border);border-radius:8px;padding:10px;font-size:12px;color:var(--sub)" id="me-preview"></div>
    </div>
    <div class="fg" style="grid-template-columns:1fr 1fr">
      <div><div class="lbl">Qtd. a entrar</div><input class="inp" id="meq" type="number" min="0" value="0"/></div>
      <div><div class="lbl">Custo unit. R$ (nova compra)</div><input class="inp" id="mec" type="number" min="0" step="0.01" value="0"/></div>
    </div>
    <div style="display:flex;gap:10px;margin-top:18px">
      <button class="btn" style="flex:1;justify-content:center" onclick="saveEntrada()">Registrar Entrada</button>
      <button class="btn btn-d" onclick="closeModal()">Cancelar</button>
    </div>
  </div>`);
}
function fillEntrada(pid){
  const p=D.estoque.find(x=>x.id==pid);
  if(!p)return;
  const info=document.getElementById('me-info');
  const prev=document.getElementById('me-preview');
  if(info)info.style.display='block';
  if(prev)prev.textContent=`${p.emoji||'📦'} ${p.nome} — Estoque atual: ${p.qty} un. | Custo atual: R$${fmt2(p.cost)} | Preço venda: R$${fmt2(p.price)}`;
  const cEl=document.getElementById('mec');if(cEl&&p.cost>0)cEl.value=p.cost;
}
function saveEntrada(){
  const pid=document.getElementById('meprod')?.value;if(!pid){alert('Selecione um produto.');return;}
  const qty=parseInt(document.getElementById('meq').value)||0;
  const cost=parseFloat(document.getElementById('mec').value)||0;
  const item=D.estoque.find(x=>x.id==pid);if(!item){return;}
  item.qty+=qty;
  if(cost>0)item.cost=cost;
  if(cost>0&&qty>0){D.txns.push({id:_id(),desc:`Entrada — ${item.nome} (${qty}un.)`,v:cost*qty,type:'out',pay:'dinheiro',motivo:'Compra de mercadoria',time:nowTime(),date:today()});save('txns');}
  save('estoque');closeModal();render();
}
// Cadastro / edição de produto (estoque + pdv juntos)
function openModalProdutoEst(eid=null){
  const e=eid?D.estoque.find(x=>x.id===eid):null;
  showModal(`<div class="modal"><h2>${e?'EDITAR':'NOVO'} PRODUTO</h2>
    <div class="fg" style="grid-template-columns:2fr 1fr">
      <div><div class="lbl">Nome</div><input class="inp" id="mpn" value="${esc(e?e.nome:'')}" placeholder="Ex: Heineken LN"/></div>
      <div><div class="lbl">Emoji</div><input class="inp" id="mpe" value="${e?e.emoji||'📦':'📦'}"/></div>
    </div>
    <div class="frow"><div class="lbl">Descrição (aparece no PDV)</div><input class="inp" id="mpd" value="${esc(e?e.descricao||'':'')}" placeholder="Ex: Long neck gelada 330ml"/></div>
    <div class="fg" style="grid-template-columns:1fr 1fr">
      <div><div class="lbl">Custo unit. R$ (compra)</div><input class="inp" id="mpcost" type="number" min="0" step="0.01" value="${e?e.cost||0:0}"/></div>
      <div><div class="lbl">Preço de Venda R$ (PDV)</div><input class="inp" id="mpprice" type="number" min="0" step="0.01" value="${e?e.price||0:0}"/></div>
    </div>
    <div class="fg" style="grid-template-columns:1fr 1fr">
      <div><div class="lbl">Qtd. em estoque</div><input class="inp" id="mpqty" type="number" min="0" value="${e?e.qty||0:0}"/></div>
      <div><div class="lbl">Qtd. mínima alerta</div><input class="inp" id="mpmin" type="number" min="0" value="${e?e.min||0:0}"/></div>
    </div>
    <div style="background:rgba(75,159,255,.1);border:1px solid rgba(75,159,255,.2);border-radius:8px;padding:10px;font-size:12px;color:var(--blue);margin-bottom:12px">
      💡 Preço de Venda &gt; 0 → produto aparece no Bar/PDV automaticamente.
    </div>
    <div style="display:flex;gap:10px;margin-top:14px">
      <button class="btn" style="flex:1;justify-content:center" onclick="saveProdutoEst(${eid||null})">Salvar</button>
      ${e?`<button class="btn btn-d" onclick="${S.isAdmin?`delEstItem(${e.id});closeModal()`:`requireAdmin(()=>{delEstItem(${e.id});closeModal()})`}">Excluir</button>`:''}
      <button class="btn btn-d" onclick="closeModal()">Cancelar</button>
    </div>
  </div>`);
}
function saveProdutoEst(eid){
  const nome=document.getElementById('mpn').value.trim();if(!nome){alert('Nome obrigatório.');return;}
  const obj={nome,emoji:document.getElementById('mpe').value||'📦',descricao:document.getElementById('mpd').value.trim(),cost:parseFloat(document.getElementById('mpcost').value)||0,price:parseFloat(document.getElementById('mpprice').value)||0,qty:parseInt(document.getElementById('mpqty').value)||0,min:parseInt(document.getElementById('mpmin').value)||0};
  if(eid){const i=D.estoque.findIndex(e=>e.id===eid);if(i>-1)D.estoque[i]={...D.estoque[i],...obj};}
  else D.estoque.push({id:_id(),...obj});
  save('estoque');closeModal();render();
}
function delEstItem(eid){if(confirm('Excluir produto do estoque?')){D.estoque=D.estoque.filter(e=>e.id!==eid);save('estoque');render();}}

        ${av(c.nome,c.tipo==='Aluno'?'var(--blue)':'var(--accent)')}
        <div style="flex:1"><div style="font-size:13px;font-weight:600">${esc(c.nome)}</div><div style="font-size:11px;color:var(--muted)">${esc(c.phone)} · ${c.tipo}</div></div>
        <button class="btn" style="padding:5px 10px;font-size:11px" onclick="enviarWA('${c.phone}')">📲</button>
      </div>`).join('')}</div>`:empty('Cadastre telefones nos clientes/alunos.')}
    </div>
    <div class="cd" style="padding:18px">
      <div style="font-weight:600;margin-bottom:14px">✍️ Compor Mensagem</div>
      <div class="frow"><div class="lbl">Template</div><select class="inp" id="watpl" onchange="fillWATpl(this.value)">${tOpts?`<option value="">— selecionar —</option>${tOpts}`:'<option>Crie um template primeiro</option>'}</select></div>
      <div class="frow"><div class="lbl">Mensagem (editável)</div><textarea class="inp" id="wamsg" rows="5" placeholder="Oi {nome}! Sua reserva está confirmada para {hora}."></textarea></div>
      <div class="frow"><div class="lbl">Número manual</div><input class="inp" id="wanum" placeholder="5521999999999 (com DDI)"/></div>
      <button class="btn" style="width:100%;justify-content:center;padding:10px" onclick="enviarWAManual()">${I.send} Abrir WhatsApp</button>
      <div style="font-size:11px;color:var(--muted);margin-top:8px;text-align:center">Abre WhatsApp Web/App para confirmar</div>
    </div>
  </div>`;
}
function fillWATpl(tid){const t=D.watpl.find(x=>x.id==tid);const el=document.getElementById('wamsg');if(el&&t)el.value=t.msg.replace(/{arena}/g,D.empresa.nome);}
function enviarWA(phone){const msg=document.getElementById('wamsg')?.value||'Olá!';const num=phone.replace(/\D/g,'');window.open(`https://wa.me/${num.startsWith('55')?num:'55'+num}?text=${encodeURIComponent(msg)}`,'_blank');}
function enviarWAManual(){const num=(document.getElementById('wanum')?.value||'').replace(/\D/g,'');const msg=document.getElementById('wamsg')?.value||'';if(!num){alert('Informe o número.');return;}window.open(`https://wa.me/${num.startsWith('55')?num:'55'+num}?text=${encodeURIComponent(msg)}`,'_blank');}
function openModalWA(wid=null){
  const w=wid?D.watpl.find(x=>x.id===wid):null;
  showModal(`<div class="modal"><h2>${w?'EDITAR':'NOVO'} TEMPLATE</h2>
    <div class="frow"><div class="lbl">Nome</div><input class="inp" id="mwn" value="${esc(w?w.name:'')}" placeholder="Ex: Lembrete Reserva"/></div>
    <div class="frow"><div class="lbl">Mensagem — use {nome} {hora} {valor} {arena}</div><textarea class="inp" id="mwm" rows="4">${esc(w?w.msg:'')}</textarea></div>
    <div style="display:flex;gap:10px;margin-top:18px">
      <button class="btn" style="flex:1;justify-content:center" onclick="saveWA(${wid||null})">Salvar</button>
      <button class="btn btn-d" onclick="closeModal()">Cancelar</button>
    </div>
  </div>`);
}
function saveWA(eid){
  const name=document.getElementById('mwn').value.trim(),msg=document.getElementById('mwm').value.trim();
  if(!name||!msg){alert('Preencha todos os campos.');return;}
  if(eid){const i=D.watpl.findIndex(w=>w.id===eid);if(i>-1)D.watpl[i]={...D.watpl[i],name,msg};}
  else D.watpl.push({id:_id(),name,msg,active:true});
  save('watpl');closeModal();render();
}
function toggleWA(wid){const w=D.watpl.find(x=>x.id===wid);if(w){w.active=!w.active;save('watpl');render();}}
function delWA(wid){if(confirm('Excluir template?')){D.watpl=D.watpl.filter(w=>w.id!==wid);save('watpl');render();}}

// ══ RELATÓRIOS ═════════════════════════════════
function sRelatorio(){
  const tab=S.relTab;
  return`<div class="tabs">
    <div class="tab${tab==='fin'?' on':''}" onclick="S.relTab='fin';render()">💰 Financeiro</div>
    <div class="tab${tab==='cli'?' on':''}" onclick="S.relTab='cli';render()">👥 Clientes</div>
    <div class="tab${tab==='est'?' on':''}" onclick="S.relTab='est';render()">📦 Estoque</div>
    <div class="tab${tab==='age'?' on':''}" onclick="S.relTab='age';render()">📅 Agenda</div>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap">
    <span style="font-size:12px;color:var(--muted)">Exportar:</span>
    <button class="btn btn-b" onclick="expCSV('${tab}')">${I.dl} CSV</button>
    <button class="btn btn-g" onclick="expXLS('${tab}')">${I.dl} Excel</button>
    <button class="btn btn-d" onclick="expPDF('${tab}')">${I.dl} PDF</button>
  </div>
  ${tab==='fin'?relFin():tab==='cli'?relCli():tab==='est'?relEst():relAge()}`;
}
function relFin(){
  const txns=[...D.txns].sort((a,b)=>b.date.localeCompare(a.date));
  const ins=txns.filter(t=>t.type==='in').reduce((s,t)=>s+t.v,0);
  const outs=txns.filter(t=>t.type==='out').reduce((s,t)=>s+t.v,0);
  const despMes=D.despFixas.filter(d=>d.ativa).reduce((s,d)=>s+(d.valor||0),0);
  return`
  <div class="g3" style="margin-bottom:12px">${[{l:'Bruto (entradas)',v:`R$${ins.toFixed(2)}`,c:'var(--ok)'},{l:'Saídas registradas',v:`R$${outs.toFixed(2)}`,c:'var(--danger)'},{l:'Líquido (bruto−saídas−desp.fixas)',v:`R$${(ins-outs-despMes).toFixed(2)}`,c:(ins-outs-despMes)>=0?'var(--accent)':'var(--danger)'}].map(k=>`<div class="cd" style="padding:14px"><div class="bb" style="font-size:22px;color:${k.c}">${k.v}</div><div style="font-size:11px;color:var(--muted)">${k.l}</div></div>`).join('')}</div>
  <div class="cd" style="overflow:hidden">
    <div class="th" style="grid-template-columns:1fr 2fr .9fr 1fr .8fr 80px">${['Data','Descrição','Valor','Forma','Motivo','Tipo'].map(h=>`<span>${h}</span>`).join('')}</div>
    ${txns.slice(0,200).map(t=>`<div class="tr" style="grid-template-columns:1fr 2fr .9fr 1fr .8fr 80px">
      <span style="font-size:12px">${fmtD(t.date)}</span>
      <span style="font-size:12px">${esc(t.desc)}</span>
      <span class="bb" style="font-size:16px;color:${t.type==='in'?'var(--ok)':'var(--danger)'}">${t.type==='in'?'+':'-'}R$${t.v.toFixed(2)}</span>
      <span style="font-size:12px">${t.pay}</span>
      <span style="font-size:11px;color:var(--sub)">${esc(t.motivo||'—')}</span>
      ${bdg(t.type==='in'?'ativo':'inativo')}
    </div>`).join('')}
    ${!txns.length?`<div>${empty('Sem dados')}</div>`:''}
  </div>`;
}
function relCli(){
  return`<div class="cd" style="overflow:hidden">
    <div class="th" style="grid-template-columns:2fr 1.5fr .8fr 1fr 80px">${['Nome','Telefone','Visitas','Plano','Status'].map(h=>`<span>${h}</span>`).join('')}</div>
    ${D.clientes.map(c=>`<div class="tr" style="grid-template-columns:2fr 1.5fr .8fr 1fr 80px">
      <div style="display:flex;align-items:center;gap:8px">${av(c.name)}<span style="font-size:13px;font-weight:600">${esc(c.name)}</span></div>
      <span style="font-size:12px">${esc(c.phone||'—')}</span>
      <span class="bb" style="font-size:17px">${c.visits||0}</span>
      <span style="font-size:12px">${esc(c.plan||'—')}</span>
      ${bdg(c.st||'ativo')}
    </div>`).join('')}${!D.clientes.length?`<div>${empty('Sem dados')}</div>`:''}
  </div>`;
}
function relEst(){
  return`<div class="cd" style="overflow:hidden">
    <div class="th" style="grid-template-columns:.4fr 2fr .7fr .7fr .9fr .9fr 80px">${['','Produto','Qtd','Mín','Custo','Venda','Status'].map(h=>`<span>${h}</span>`).join('')}</div>
    ${D.estoque.map(e=>{const low=e.qty<=(e.min||0);return`<div class="tr" style="grid-template-columns:.4fr 2fr .7fr .7fr .9fr .9fr 80px">
      <span style="font-size:18px">${e.emoji||'📦'}</span>
      <span style="font-size:13px;font-weight:500">${esc(e.nome)}</span>
      <span class="bb" style="font-size:17px;color:${low?'var(--danger)':'var(--text)'}">${e.qty}</span>
      <span style="font-size:12px;color:var(--muted)">${e.min||0}</span>
      <span style="font-size:12px">R$${fmt2(e.cost)}</span>
      <span style="font-size:12px;color:var(--accent)">R$${fmt2(e.price)}</span>
      <span style="font-size:11px;font-weight:700;color:${low?'var(--danger)':'var(--ok)'}">${low?'Baixo':'OK'}</span>
    </div>`}).join('')}${!D.estoque.length?`<div>${empty('Sem dados')}</div>`:''}
  </div>`;
}
function relAge(){
  const slots=[...D.slots].sort((a,b)=>b.date.localeCompare(a.date)||a.time.localeCompare(b.time));
  return`<div class="cd" style="overflow:hidden">
    <div class="th" style="grid-template-columns:1fr 1fr 1fr 1.5fr 1fr 80px">${['Data','Início','Fim','Cliente','Preço','Status'].map(h=>`<span>${h}</span>`).join('')}</div>
    ${slots.slice(0,200).map(s=>`<div class="tr" style="grid-template-columns:1fr 1fr 1fr 1.5fr 1fr 80px">
      <span style="font-size:12px">${fmtD(s.date)}</span>
      <span class="bb" style="font-size:16px;color:var(--accent)">${s.time}</span>
      <span style="font-size:12px">${s.end}</span>
      <span style="font-size:12px">${esc(s.client||'—')}</span>
      <span style="font-size:12px">R$${fmt2(s.price)}</span>
      ${bdg(s.status)}
    </div>`).join('')}${!slots.length?`<div>${empty('Sem dados')}</div>`:''}
  </div>`;
}
function getRelData(tab){
  if(tab==='fin')return{h:['Data','Hora','Descrição','Valor','Tipo','Forma','Motivo'],r:D.txns.map(t=>[t.date,t.time,t.desc,t.v,t.type,t.pay,t.motivo||''])};
  if(tab==='cli')return{h:['Nome','Telefone','Visitas','Plano','Status'],r:D.clientes.map(c=>[c.name,c.phone||'',c.visits||0,c.plan||'',c.st||''])};
  if(tab==='est')return{h:['Produto','Qtd','Mín','Custo','Preço Venda'],r:D.estoque.map(e=>[e.nome,e.qty,e.min||0,e.cost||0,e.price||0])};
  return{h:['Data','Início','Fim','Cliente','Preço','Status'],r:D.slots.map(s=>[s.date,s.time,s.end,s.client||'',s.price||0,s.status])};
}
function dlBlob(content,fname,mime){const b=new Blob([content],{type:mime}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=fname;a.click();}
function expCSV(tab){const{h,r}=getRelData(tab);const csv='\uFEFF'+[h,...r].map(row=>row.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');dlBlob(csv,`arena-${tab}-${today()}.csv`,'text/csv;charset=utf-8');}
function expXLS(tab){const{h,r}=getRelData(tab);const tbl=`<table><tr>${h.map(x=>`<th>${x}</th>`).join('')}</tr>${r.map(row=>`<tr>${row.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</table>`;dlBlob(`<html><head><meta charset='utf-8'/></head><body>${tbl}</body></html>`,`arena-${tab}-${today()}.xls`,'application/vnd.ms-excel');}
function expPDF(tab){const{h,r}=getRelData(tab);const tbl=`<table border="1" cellpadding="6" cellspacing="0" style="border-collapse:collapse;width:100%;font-size:12px"><thead><tr style="background:#eee">${h.map(x=>`<th>${x}</th>`).join('')}</tr></thead><tbody>${r.map(row=>`<tr>${row.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table>`;const w=window.open('','_blank');w.document.write(`<html><head><title>${esc(D.empresa.nome)}</title><style>body{font-family:Arial,sans-serif;padding:24px}@media print{button{display:none}}</style></head><body><h2 style="margin-bottom:14px">${esc(D.empresa.nome)} · ${tab} · ${new Date().toLocaleDateString('pt-BR')}</h2>${tbl}<br/><button onclick="window.print()" style="padding:8px 16px;cursor:pointer">🖨️ Imprimir / PDF</button></body></html>`);w.document.close();}

      <div><div class="lbl">Desconto (%)</div><input class="inp" id="mdp" type="number" min="0" max="100" value="${d?d.descontoPct:10}"/></div>
    </div>
    <div style="display:flex;gap:10px;margin-top:18px">
      <button class="btn" style="flex:1;justify-content:center" onclick="saveDesconto(${did||null})">Salvar</button>
      ${d?`<button class="btn btn-d" onclick="delDesconto(${d.id});closeModal()">Excluir</button>`:''}
      <button class="btn btn-d" onclick="closeModal()">Cancelar</button>
    </div>
  </div>`);
}
function saveDesconto(eid){
  const obj={desc:document.getElementById('mdd').value.trim(),horasMin:parseInt(document.getElementById('mdh').value)||1,descontoPct:parseFloat(document.getElementById('mdp').value)||0};
  if(eid){const i=D.descontos.findIndex(x=>x.id===eid);if(i>-1)D.descontos[i]={...D.descontos[i],...obj};}
  else D.descontos.push({id:_id(),...obj});
  save('descontos');closeModal();render();
}
function delDesconto(did){if(confirm('Excluir?')){D.descontos=D.descontos.filter(x=>x.id!==did);save('descontos');render();}}
function cfgUsr(){
  return`<div style="display:flex;justify-content:flex-end;margin-bottom:12px"><button class="btn" onclick="${S.isAdmin?'openModalUsr()':'requireAdmin(()=>openModalUsr())'}">${I.plus} Adicionar</button></div>
  <div class="cd" style="padding:20px;max-width:500px">
    ${D.usuarios.map(u=>`<div style="display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border)">
      ${av(u.nome,u.acesso==='total'?'var(--accent)':'var(--blue)')}
      <div style="flex:1"><div style="font-size:13px;font-weight:600">${esc(u.nome)}</div><div style="font-size:11px;color:var(--muted)">${esc(u.funcao)} · ${u.acesso}</div></div>
      <span style="font-size:11px;padding:3px 8px;border-radius:6px;background:${u.acesso==='total'?'var(--aB)':'rgba(75,159,255,.1)'};color:${u.acesso==='total'?'var(--accent)':'var(--blue)'}">${u.acesso==='total'?'🔓 Admin':'🔒 Limitado'}</span>
      ${u.id!==1?`<span onclick="${S.isAdmin?`delUsr(${u.id})`:`requireAdmin(()=>delUsr(${u.id}))`}" style="cursor:pointer">${I.trash}</span>`:''}
    </div>`).join('')}
  </div>`;
}
function openModalUsr(){
  showModal(`<div class="modal"><h2>NOVO USUÁRIO</h2>
    <div class="frow"><div class="lbl">Nome</div><input class="inp" id="mun" placeholder="Nome"/></div>
    <div class="fg" style="grid-template-columns:1fr 1fr">
      <div><div class="lbl">Função</div><input class="inp" id="muf" placeholder="Atendente"/></div>
      <div><div class="lbl">Acesso</div><select class="inp" id="mua"><option value="limitado">Limitado</option><option value="total">Total (Admin)</option></select></div>
    </div>
    <div style="display:flex;gap:10px;margin-top:18px">
      <button class="btn" style="flex:1;justify-content:center" onclick="saveUsr()">Salvar</button>
      <button class="btn btn-d" onclick="closeModal()">Cancelar</button>
    </div>
  </div>`);
}
function saveUsr(){const nome=document.getElementById('mun').value.trim();if(!nome){alert('Nome obrigatório.');return;}D.usuarios.push({id:_id(),nome,funcao:document.getElementById('muf').value.trim(),acesso:document.getElementById('mua').value});save('usuarios');closeModal();render();}
function delUsr(uid){if(confirm('Excluir?')){D.usuarios=D.usuarios.filter(u=>u.id!==uid);save('usuarios');render();}}
function cfgPrc(){
  return`<div class="cd" style="padding:20px;max-width:500px">
    <div class="hdr"><span style="font-weight:600">Faixas de Preço</span><button class="btn" onclick="${S.isAdmin?'savePrecos()':'requireAdmin(()=>savePrecos())'}">💾 Salvar</button></div>
    ${D.preco.map((f,i)=>`<div style="display:flex;align-items:center;gap:14px;padding:10px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:13px;flex:1">${esc(f.p)}</span>
      <input class="inp" id="fp${i}" value="${esc(f.v)}" style="width:130px;padding:6px 10px"/>
    </div>`).join('')}
  </div>`;
}
function savePrecos(){D.preco.forEach((_,i)=>{const e=document.getElementById('fp'+i);if(e)D.preco[i].v=e.value.trim();});save('preco');alert('✅ Preços salvos!');}
function cfgBkp(){
  return`<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div class="cd" style="padding:20px">
      <div class="hdr"><span style="font-weight:600">💾 Exportar Backup</span></div>
      <p style="font-size:12px;color:var(--muted);margin-bottom:14px">Exporte todos os dados em JSON.</p>
      <button class="btn" onclick="exportBkp()" style="width:100%;justify-content:center;padding:12px">${I.dl} Baixar Backup</button>
    </div>
    <div class="cd" style="padding:20px">
      <div class="hdr"><span style="font-weight:600">📂 Importar Backup</span></div>
      <p style="font-size:12px;color:var(--muted);margin-bottom:10px">⚠️ Substitui todos os dados atuais.</p>
      <input type="file" id="bkfile" accept=".json" style="font-size:12px;color:var(--sub);margin-bottom:10px"/>
      <button class="btn btn-o" onclick="${S.isAdmin?'importBkp()':'requireAdmin(()=>importBkp())'}" style="width:100%;justify-content:center;padding:10px">${I.ul} Importar</button>
      <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border)">
        <button class="btn btn-d" style="width:100%;justify-content:center" onclick="${S.isAdmin?'resetData()':'requireAdmin(()=>resetData())'}">🗑️ Limpar Todos os Dados</button>
      </div>
    </div>
  </div>`;
}
function exportBkp(){const b=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`arena-backup-${today()}.json`;a.click();}
function importBkp(){const f=document.getElementById('bkfile')?.files[0];if(!f){alert('Selecione um arquivo JSON.');return;}const r=new FileReader();r.onload=e=>{try{const nd=JSON.parse(e.target.result);Object.keys(nd).forEach(k=>{D[k]=nd[k];DB.set(k,nd[k]);});applyTheme();renderSidebar();render();alert('✅ Backup importado!');}catch(err){alert('Arquivo inválido: '+err.message);}};r.readAsText(f);}
function resetData(){if(confirm('⚠️ Apagar TODOS os dados?')&&confirm('Confirmação final — irreversível.')){Object.keys(D).forEach(k=>DB.del(k));D=loadData();applyTheme();renderSidebar();render();alert('Dados limpos.');}}
function cfgLnk(){
  const slug=D.empresa.slug||'arena';
  const link=`${location.href.split('?')[0].split('#')[0]}#agendar/${slug}`;
  return`<div class="cd" style="padding:20px;max-width:540px">
    <div class="hdr"><span style="font-weight:600">🔗 Link de Agendamento Público</span></div>
    <p style="font-size:12px;color:var(--muted);margin-bottom:14px">Clientes acessam este link para ver horários disponíveis e solicitar reservas.</p>
    <div class="frow"><div class="lbl">Slug personalizado</div>
      <div style="display:flex;gap:8px"><input class="inp" id="cfslug" value="${esc(slug)}" style="flex:1"/><button class="btn" onclick="saveSlug()">Salvar</button></div>
    </div>
    <div style="background:var(--s3);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px">
      <div style="font-size:11px;color:var(--muted);margin-bottom:5px">Link gerado:</div>
      <div style="font-size:12px;color:var(--accent);word-break:break-all">${link}</div>
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn" style="flex:1;justify-content:center" onclick="copyLink('${link}')">${I.link} Copiar</button>
      <button class="btn btn-b" onclick="window.open('${link}','_blank')">👁️ Visualizar</button>
    </div>
  </div>`;
}
function saveSlug(){const s=(document.getElementById('cfslug')?.value||'').trim().replace(/[^a-z0-9\-_]/gi,'').toLowerCase();if(!s){alert('Slug inválido.');return;}D.empresa.slug=s;save('empresa');render();}
function copyLink(link){navigator.clipboard?.writeText(link).then(()=>alert('✅ Copiado!')).catch(()=>alert(link));}

// ══ PÁGINA PÚBLICA ══════════════════════════════
function showBookingPage(){
  document.getElementById('app').style.display='none';
  const bp=document.getElementById('booking-page');bp.classList.add('show');
  const td=today();
  const available=D.slots.filter(s=>s.date>=td&&s.status==='livre').sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  const logo=D.empresa.logo?`<img src="${D.empresa.logo}" style="width:64px;height:64px;border-radius:12px;object-fit:cover"/>`:`<div style="width:64px;height:64px;border-radius:12px;background:linear-gradient(135deg,var(--accent),#005C42);display:flex;align-items:center;justify-content:center;font-size:30px">⚽</div>`;
  bp.innerHTML=`<div style="width:100%;max-width:480px;padding:24px">
    <div style="text-align:center;margin-bottom:20px">${logo}<div class="bb" style="font-size:26px;letter-spacing:2px;margin-top:8px">${esc(D.empresa.nome)}</div><div style="font-size:12px;color:var(--muted)">Agendamento Online</div></div>
    <div class="cd" style="padding:18px">
      <div style="font-weight:600;margin-bottom:14px">📅 Horários Disponíveis</div>
      ${available.length?available.slice(0,15).map(s=>{const q=D.quadras.find(x=>x.id===s.quadraId);return`<div style="display:flex;align-items:center;gap:12px;padding:11px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;background:var(--s3)">
        <div style="flex:1"><div style="font-weight:600;font-size:13px">${fmtD(s.date)} — <span style="color:var(--accent)">${s.time}</span> às ${s.end}</div><div style="font-size:11px;color:var(--muted)">${q?esc(q.nome):'Quadra'} · R$${fmt2(s.price)}/h</div></div>
        <button class="btn" style="padding:5px 11px;font-size:12px" onclick="bkSolicit(${s.id})">Reservar</button>
      </div>`}).join(''):`<div style="text-align:center;color:var(--muted);padding:22px;font-size:13px">Nenhum horário disponível.</div>`}
    </div>
    <div id="bkform" class="cd" style="padding:18px;margin-top:14px;display:none">
      <div style="font-weight:600;margin-bottom:12px">📝 Seus Dados</div>
      <div class="frow"><div class="lbl">Nome</div><input class="inp" id="bknome" placeholder="Seu nome completo"/></div>
      <div class="frow"><div class="lbl">WhatsApp</div><input class="inp" id="bktel" placeholder="(xx) 9xxxx-xxxx"/></div>
      <div id="bkinfo" style="font-size:13px;color:var(--accent);margin-bottom:10px"></div>
      <button class="btn" style="width:100%;justify-content:center;padding:11px" onclick="bkConfirm()">✅ Confirmar Solicitação</button>
    </div>
    <div style="text-align:center;margin-top:14px;font-size:11px;color:var(--muted)">Powered by Arena Pro</div>
  </div>`;
}
let bkSlotId=null;
function bkSolicit(sid){bkSlotId=sid;const f=document.getElementById('bkform');if(!f)return;const s=D.slots.find(x=>x.id===sid);if(s)document.getElementById('bkinfo').textContent=`Selecionado: ${fmtD(s.date)} ${s.time}–${s.end}`;f.style.display='block';f.scrollIntoView({behavior:'smooth'});}
function bkConfirm(){
  const nome=document.getElementById('bknome')?.value.trim(),tel=document.getElementById('bktel')?.value.trim();
  if(!nome||!tel){alert('Preencha nome e telefone.');return;}
  const slot=D.slots.find(s=>s.id===bkSlotId);
  if(!slot||slot.status!=='livre'){alert('Horário não disponível.');return;}
  slot.status='reservado';slot.client=nome;
  if(!D.clientes.find(c=>c.name.toLowerCase()===nome.toLowerCase()))D.clientes.push({id:_id(),name:nome,phone:tel,visits:0,st:'ativo'});
  save('slots');save('clientes');
  alert(`✅ Solicitação enviada!\n${nome} — ${fmtD(slot.date)} ${slot.time}–${slot.end}\n\nAguarde confirmação da arena.`);
  document.getElementById('bkform').style.display='none';showBookingPage();
}

// ══ RENDER ═════════════════════════════════════
const SCR={dashboard:sDashboard,agenda:sAgenda,comanda:sComanda,pdv:sPDV,clientes:sClientes,aulas:sAulas,financeiro:sFinanceiro,estoque:sEstoque,whatsapp:sWhatsApp,relatorio:sRelatorio,config:sConfig};
function render(){document.getElementById('ct').innerHTML=SCR[S.screen]?SCR[S.screen]():'';}

// ══ PWA — INSTALL PROMPT ═══════════════════════
// Service Worker via blob não é suportado em todos os ambientes.
// O app funciona 100% offline via localStorage sem necessidade de SW.
let dPWA=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();dPWA=e;document.getElementById('pwa-banner').classList.add('show');});
document.getElementById('pwabtn').addEventListener('click',()=>{if(dPWA){dPWA.prompt();dPWA.userChoice.then(()=>{dPWA=null;document.getElementById('pwa-banner').classList.remove('show');});}});
window.addEventListener('appinstalled',()=>document.getElementById('pwa-banner').classList.remove('show'));
window.addEventListener('offline',()=>document.getElementById('offline-b').classList.add('show'));
window.addEventListener('online',()=>document.getElementById('offline-b').classList.remove('show'));

// ══ INIT ═══════════════════════════════════════
if(location.hash.startsWith('#agendar/')){applyTheme();showBookingPage();}
else{applyTheme();renderSidebar();render();}
</script>
</body>
</html>
