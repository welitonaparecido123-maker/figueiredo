<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Finanças Familiar</title>
<meta name="theme-color" content="#07101D"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07101D;--s1:#0C1825;--s2:#112435;--s3:#162E42;--border:#1C3448;--accent:#00C875;--aB:rgba(0,200,117,.1);--text:#E0EFF8;--sub:#7BA3BC;--muted:#3D617A;--ok:#20D070;--warn:#F5A623;--danger:#F04444;--blue:#4B9FFF;--purple:#9B72F8;--orange:#FF6535}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;font-size:14px;height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
#app{display:flex;height:100vh}
#sb{width:220px;background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:width .22s;flex-shrink:0;overflow:hidden}
#sb.col{width:64px}
#sbl{padding:16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;white-space:nowrap;min-height:68px}
.sball{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#006B3C);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
#sbn{flex:1;padding:8px;overflow-y:auto}
.ni{display:flex;align-items:center;gap:12px;padding:9px 10px;border-radius:8px;cursor:pointer;margin-bottom:2px;color:var(--sub);border-left:2px solid transparent;transition:all .15s;white-space:nowrap;position:relative}
.ni:hover{background:var(--s2)}.ni.on{background:var(--aB);color:var(--accent);border-left-color:var(--accent)}.ni.on .nl{font-weight:600}
.nl{font-size:13px;flex:1}.nb{border-radius:10px;padding:1px 7px;font-size:10px;font-weight:700}
#sb.col .nl,#sb.col .nb,#sb.col #sbl .sc{display:none}
#sb.col .ni{justify-content:center}
#sbt{padding:10px 14px;border-top:1px solid var(--border);cursor:pointer;color:var(--muted);display:flex;align-items:center;gap:8px;font-size:11px}
.chv{transition:transform .2s}#sb:not(.col) .chv{transform:rotate(180deg)}
#mn{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#tb{height:54px;background:var(--s1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0}
#tbt{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px}
#ct{flex:1;overflow-y:auto;overflow-x:hidden;padding:20px}
.cd{background:var(--s2);border:1px solid var(--border);border-radius:12px}
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.btn{background:var(--aB);color:var(--accent);border:1px solid rgba(0,200,117,.27);border-radius:8px;padding:7px 13px;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-weight:600;white-space:nowrap;font-family:inherit;transition:background .15s}
.btn:hover{background:rgba(0,200,117,.2)}
.btn-d{background:rgba(240,68,68,.1)!important;color:var(--danger)!important;border-color:rgba(240,68,68,.3)!important}
.btn-b{background:rgba(75,159,255,.1)!important;color:var(--blue)!important;border-color:rgba(75,159,255,.3)!important}
.btn-g{background:rgba(32,208,112,.1)!important;color:var(--ok)!important;border-color:rgba(32,208,112,.3)!important}
.btn-o{background:rgba(255,101,53,.1)!important;color:var(--orange)!important;border-color:rgba(255,101,53,.3)!important}
.bdg{border-radius:6px;padding:3px 8px;font-size:11px;font-weight:600;white-space:nowrap}
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:18px;flex-wrap:wrap}
.tab{padding:8px 14px;cursor:pointer;font-size:12px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;transition:all .15s;margin-bottom:-1px}
.tab.on{color:var(--accent);border-bottom-color:var(--accent)}
.th{display:grid;padding:10px 16px;background:var(--s3);font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.4px;text-transform:uppercase;border-bottom:1px solid var(--border)}
.tr{display:grid;padding:12px 16px;border-bottom:1px solid var(--border);align-items:center}
.tr:hover{background:rgba(255,255,255,.02)}
.inp{background:var(--s3);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;font-family:inherit;width:100%;outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--accent)}
.lbl{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.4px;text-transform:uppercase;margin-bottom:5px}
.frow{margin-bottom:12px}.fg{display:grid;gap:12px;margin-bottom:12px}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(3px)}
.modal{background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:24px;width:480px;max-width:96vw;max-height:92vh;overflow-y:auto}
.modal h2{font-family:'Bebas Neue',sans-serif;font-size:24px;margin-bottom:18px;letter-spacing:1px}
.empty{padding:48px;text-align:center;color:var(--muted)}
.empty .ei{font-size:38px;margin-bottom:10px;opacity:.4}
.empty p{font-size:13px}
.bb{font-family:'Bebas Neue',sans-serif}
.kg{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kg3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:14px}
.g2{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:14px}
.g22{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.stb{height:6px;border-radius:3px;background:var(--s3);overflow:hidden}
.prog{height:100%;border-radius:3px;transition:width .3s}
select.inp option{background:var(--s3)}
svg{display:inline-block;vertical-align:middle}
@media(max-width:900px){.kg{grid-template-columns:repeat(2,1fr)}.g2,.g22{grid-template-columns:1fr}.kg3{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.kg{grid-template-columns:1fr}.kg3{grid-template-columns:1fr}#sb{display:none}}
@media print{#sb,#tb,.btn,button{display:none!important}#ct{overflow:visible;padding:0}body{overflow:visible;height:auto}}
</style>
</head>
<body>
<div id="app">
  <div id="sb">
    <div id="sbl">
      <div class="sball">💰</div>
      <div class="sc">
        <div id="sb-nome" style="font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;color:var(--text);line-height:1">Finanças</div>
        <div style="font-size:10px;color:var(--muted)">Controle Familiar</div>
      </div>
    </div>
    <div id="sbn"></div>
    <div id="sbt" onclick="toggleSB()">
      <svg class="chv" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      <span>Recolher menu</span>
    </div>
  </div>
  <div id="mn">
    <div id="tb">
      <div id="tbt">Dashboard</div>
      <div style="flex:1"></div>
      <div id="tb-mes" style="font-size:12px;color:var(--muted)"></div>
    </div>
    <div id="ct"></div>
  </div>
</div>
<div id="modal-root"></div>
<script>
'use strict';
const I={
dashboard:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>`,
receitas:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>`,
despesas:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,
dividas:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`,
invest:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>`,
cartao:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>`,
relatorio:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>`,
config:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`,
plus:`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
edit:`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--sub)" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
trash:`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>`,
up:`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--ok)" stroke-width="2"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>`,
down:`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="2"><line x1="7" y1="7" x2="17" y2="17"/><polyline points="17 7 17 17 7 17"/></svg>`,
dl:`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,
alert:`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
};

const DB={
  get(k){try{const v=localStorage.getItem('ff_'+k);return v?JSON.parse(v):null;}catch{return null;}},
  set(k,v){try{localStorage.setItem('ff_'+k,JSON.stringify(v));}catch{}},
  del(k){try{localStorage.removeItem('ff_'+k);}catch{}}
};

function loadData(){return{
  config:   DB.get('config')  ||{nome:'Família',corPrimaria:'#00C875'},
  receitas: DB.get('receitas')||[],
  despesas: DB.get('despesas')||[],
  dividas:  DB.get('dividas') ||[],
  invest:   DB.get('invest')  ||[],
  cartoes:  DB.get('cartoes') ||[],
  faturas:  DB.get('faturas') ||[],
};}
let D=loadData();
function save(k){DB.set(k,D[k]);}

const S={screen:'dashboard',sbOpen:true,mesRef:new Date().getMonth(),anoRef:new Date().getFullYear(),nextId:Date.now()};
const _id=()=>++S.nextId;
const MESES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const TITLES={dashboard:'Dashboard',receitas:'Receitas',despesas:'Despesas',dividas:'Dívidas',invest:'Investimentos',cartao:'Cartão de Crédito',relatorio:'Relatórios',config:'Configurações'};
const CAT_REC=['Salário','Freelance','Aluguel','Dividendos','Pensão','13º Salário','Bônus','Outros'];
const CAT_DESP=['Alimentação','Moradia','Transporte','Saúde','Educação','Lazer','Vestuário','Contas','Assinaturas','Higiene','Pet','Outros'];
const CAT_DIV=['Empréstimo','Financiamento','Cartão','Pessoal','Cheque Especial','Outros'];
const TIPOS_INV=['Poupança','CDB','Tesouro Direto','Ações','FIIs','Criptomoedas','Renda Fixa','Previdência','Outros'];
const FORMAS=['Dinheiro','PIX','Débito','Crédito','Transferência','Boleto'];
const CORES_CART=['#4B9FFF','#9B72F8','#F04444','#F5A623','#20D070','#FF6535','#00C875','#E91E8C'];

const today=()=>new Date().toISOString().slice(0,10);
const mesAtual=()=>`${S.anoRef}-${String(S.mesRef+1).padStart(2,'0')}`;
const fmt=v=>Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const fmt2=v=>parseFloat(v||0).toFixed(2);
const fmtD=d=>{try{return new Date(d+'T00:00').toLocaleDateString('pt-BR');}catch{return d;}};
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const empty=(msg,btn='')=>`<div class="empty"><div class="ei">📭</div><p>${msg}</p>${btn?`<div style="margin-top:14px">${btn}</div>`:''}</div>`;
const act=(e,d)=>`<div style="display:flex;gap:6px">${e?`<span onclick="${e}" style="cursor:pointer">${I.edit}</span>`:''} ${d?`<span onclick="${d}" style="cursor:pointer">${I.trash}</span>`:''}</div>`;

function bdg(s){
  const m={ativo:{c:'var(--ok)',l:'Ativo'},inativo:{c:'var(--muted)',l:'Inativo'},'em dia':{c:'var(--ok)',l:'Em dia'},atrasado:{c:'var(--danger)',l:'Atrasado'},quitado:{c:'var(--blue)',l:'Quitado'},aberta:{c:'var(--warn)',l:'Aberta'},paga:{c:'var(--ok)',l:'Paga'}};
  const b=m[s]||{c:'var(--muted)',l:s};
  return`<span class="bdg" style="background:${b.c}20;color:${b.c}">${b.l}</span>`;
}
function hexRgba(hex,a){try{const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}catch{return`rgba(0,200,117,${a})`;}}
function applyTheme(){const c=D.config.corPrimaria||'#00C875';document.documentElement.style.setProperty('--accent',c);document.documentElement.style.setProperty('--aB',hexRgba(c,.1));}

function showModal(html){document.getElementById('modal-root').innerHTML=`<div class="ov" onclick="if(event.target.classList.contains('ov'))closeModal()">${html}</div>`;}
function closeModal(){document.getElementById('modal-root').innerHTML='';}

function barChart(data){
  if(!data||!data.length)return`<div style="height:140px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px">Sem dados</div>`;
  const W=520,H=145,pL=48,pB=24,pR=8,pT=8,cW=W-pL-pR,cH=H-pB-pT;
  const maxV=Math.max(...data.map(d=>Math.max(d.in||0,d.out||0)),1);
  const mag=Math.pow(10,Math.floor(Math.log10(maxV)));
  const yMax=Math.ceil(maxV/mag)*mag;
  const bW=Math.floor(cW/data.length*.3),gap=cW/data.length;
  let o=`<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" style="display:block">`;
  for(let i=0;i<=4;i++){const yv=yMax/4*i,y=pT+cH*(1-yv/yMax);o+=`<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="var(--border)" stroke-width="1"/><text x="${pL-4}" y="${y+4}" text-anchor="end" fill="var(--muted)" font-size="9" font-family="DM Sans,sans-serif">${yv>=1000?Math.round(yv/100)/10+'k':yv}</text>`;}
  data.forEach((d,i)=>{
    const x=pL+i*gap+(gap-bW*2.2)/2;
    const bHi=Math.max(2,cH*(d.in||0)/yMax),bHo=Math.max(2,cH*(d.out||0)/yMax);
    o+=`<rect x="${x}" y="${pT+cH-bHi}" width="${bW}" height="${bHi}" rx="2" fill="var(--ok)" opacity=".85"/>`;
    o+=`<rect x="${x+bW*1.2}" y="${pT+cH-bHo}" width="${bW}" height="${bHo}" rx="2" fill="var(--danger)" opacity=".85"/>`;
    o+=`<text x="${pL+i*gap+gap/2}" y="${H-5}" text-anchor="middle" fill="var(--muted)" font-size="10" font-family="DM Sans,sans-serif">${d.d}</text>`;
  });
  return o+`</svg>`;
}

function donutChart(data){
  if(!data||!data.length||!data.reduce((s,d)=>s+d.v,0))return`<div style="height:140px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px">Sem dados</div>`;
  const total=data.reduce((s,d)=>s+d.v,0);
  const colors=['#00C875','#4B9FFF','#F5A623','#F04444','#9B72F8','#FF6535','#20D070','#87CEEB','#FFB347','#E91E8C'];
  const cx=75,cy=75,r=58,ri=36;
  let o=`<svg viewBox="0 0 280 150" width="100%" height="150" style="display:block">`;
  let angle=-Math.PI/2;
  data.forEach((d,i)=>{
    const pct=d.v/total,a=pct*2*Math.PI;
    const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
    const x2=cx+r*Math.cos(angle+a),y2=cy+r*Math.sin(angle+a);
    const xi1=cx+ri*Math.cos(angle),yi1=cy+ri*Math.sin(angle);
    const xi2=cx+ri*Math.cos(angle+a),yi2=cy+ri*Math.sin(angle+a);
    const lg=a>Math.PI?1:0;
    o+=`<path d="M${x1},${y1} A${r},${r} 0 ${lg},1 ${x2},${y2} L${xi2},${yi2} A${ri},${ri} 0 ${lg},0 ${xi1},${yi1} Z" fill="${colors[i%colors.length]}" opacity=".9"/>`;
    angle+=a;
  });
  o+=`<text x="${cx}" y="${cy+4}" text-anchor="middle" fill="var(--text)" font-size="10" font-family="DM Sans,sans-serif" font-weight="600">${fmt(total)}</text>`;
  let ly=10;
  data.slice(0,7).forEach((d,i)=>{const c=colors[i%colors.length],pct=Math.round(d.v/total*100);o+=`<rect x="165" y="${ly}" width="9" height="9" rx="2" fill="${c}"/><text x="179" y="${ly+8}" fill="var(--sub)" font-size="10" font-family="DM Sans,sans-serif">${esc(d.d)} ${pct}%</text>`;ly+=17;});
  return o+`</svg>`;
}

// ── SIDEBAR ──
const NAV=[
  {id:'dashboard',icon:'dashboard',label:'Dashboard'},
  {id:'receitas',icon:'receitas',label:'Receitas'},
  {id:'despesas',icon:'despesas',label:'Despesas'},
  {id:'dividas',icon:'dividas',label:'Dívidas'},
  {id:'invest',icon:'invest',label:'Investimentos'},
  {id:'cartao',icon:'cartao',label:'Cartão'},
  {id:'relatorio',icon:'relatorio',label:'Relatórios'},
  {id:'config',icon:'config',label:'Configurações'},
];
function renderSidebar(){
  document.getElementById('sb-nome').textContent=D.config.nome||'Finanças';
  const divAt=D.dividas.filter(d=>d.st==='atrasado').length;
  document.getElementById('sbn').innerHTML=NAV.map(n=>{
    const on=S.screen===n.id;
    let badge='';
    if(n.id==='dividas'&&divAt>0)badge=`<span class="nb" style="background:rgba(240,68,68,.2);color:var(--danger)">${divAt}</span>`;
    return`<div class="ni${on?' on':''}" onclick="nav('${n.id}')">${I[n.icon]}<span class="nl">${n.label}</span>${badge}</div>`;
  }).join('');
}

      {l:'Saldo de '+MESES[S.mesRef],v:fmt(saldo),i:'📊',c:saldo>=0?'var(--accent)':'var(--danger)'},
      {l:'Total Dívidas',v:fmt(totalDiv),i:'📋',c:'var(--warn)'},
    ].map(k=>`<div class="cd" style="padding:18px">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-size:24px">${k.i}</span>${saldo>=0?I.up:I.down}</div>
      <div class="bb" style="font-size:24px;color:${k.c};line-height:1">${k.v}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:5px">${k.l}</div>
    </div>`).join('')}
  </div>
  <div class="g2">
    <div class="cd" style="padding:18px">
      <div class="hdr"><span style="font-weight:600">Receitas vs Despesas — 6 Meses</span><div style="font-size:11px;display:flex;gap:8px"><span style="color:var(--ok)">● Receita</span><span style="color:var(--danger)">● Despesa</span></div></div>
      ${barChart(chart)}
    </div>
    <div>
      <div class="cd" style="padding:16px;margin-bottom:12px">
        <div style="font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px">💼 Patrimônio Investido</div>
        <div class="bb" style="font-size:26px;color:var(--accent)">${fmt(totalInv)}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">${D.invest.length} investimento(s)</div>
      </div>
      <div class="cd" style="padding:16px">
        <div style="font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px">📊 Saúde Financeira</div>
        ${[
          {l:'Receita - Despesa',v:fmt(saldo),c:saldo>=0?'var(--ok)':'var(--danger)'},
          {l:'Comprometimento',v:recMes?Math.round(despMes/recMes*100)+'%':'—',c:'var(--warn)'},
          {l:'Patrimônio líq.',v:fmt(totalInv-totalDiv),c:totalInv>=totalDiv?'var(--ok)':'var(--danger)'},
        ].map(k=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px"><span style="color:var(--muted)">${k.l}</span><span style="font-weight:700;color:${k.c}">${k.v}</span></div>`).join('')}
      </div>
    </div>
  </div>
  <div class="g22">
    <div class="cd" style="padding:16px">
      <div class="hdr"><span style="font-weight:600">📋 Dívidas / Vencimentos</span><button class="btn" style="font-size:11px;padding:4px 10px" onclick="nav('dividas')">Ver tudo</button></div>
      ${venc.length?venc.map(d=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
        <div style="width:32px;height:32px;background:${d.st==='atrasado'?'rgba(240,68,68,.15)':'rgba(245,166,35,.15)'};border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:${d.st==='atrasado'?'var(--danger)':'var(--warn)'};flex-shrink:0">D${d.diaVenc}</div>
        <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(d.nome)}</div><div style="font-size:11px;color:var(--muted)">${d.parcelas>1?`Parc. ${d.parcelaAtual||1}/${d.parcelas}`:d.categoria}</div></div>

      ${recentes.length?recentes.map(d=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
        <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(d.desc)}</div><div style="font-size:11px;color:var(--muted)">${fmtD(d.data)} · ${d.categoria}</div></div>
        <span style="font-weight:700;color:var(--danger);flex-shrink:0">${fmt(d.valor)}</span>
      </div>`).join(''):empty('Nenhuma despesa')}
    </div>
  </div>`;
}

function openModalRec(rid=null){
  const r=rid?D.receitas.find(x=>x.id===rid):null;

function saveRec(eid){
  const desc=document.getElementById('rrd').value.trim();if(!desc){alert('Descrição obrigatória.');return;}
  const obj={desc,valor:parseFloat(document.getElementById('rrv').value)||0,data:document.getElementById('rrdt').value||today(),categoria:document.getElementById('rrc').value,recorrente:document.getElementById('rrrec').checked};
  if(eid){const i=D.receitas.findIndex(x=>x.id===eid);if(i>-1)D.receitas[i]={...D.receitas[i],...obj};}

function pagarParc(did){
  const d=D.dividas.find(x=>x.id===did);if(!d)return;
  const parcVal=d.parcelas>1?(d.valorRestante/Math.max(1,d.parcelas-(d.parcelaAtual||1)+1)):d.valorRestante;
  showModal(`<div class="modal"><h2>PAGAR PARCELA</h2>
    <div style="font-size:14px;font-weight:600;margin-bottom:12px">${esc(d.nome)}</div>
    <div class="frow"><div class="lbl">Valor da Parcela R$</div><input class="inp" id="ppv" type="number" step="0.01" value="${fmt2(parcVal)}"/></div>
    <div class="frow"><div class="lbl">Data do Pagamento</div><input class="inp" id="ppdt" type="date" value="${today()}"/></div>
    <div style="display:flex;gap:10px;margin-top:18px">
      <button class="btn" style="flex:1;justify-content:center" onclick="confirmarPag(${did})">Confirmar</button>
      <button class="btn btn-d" onclick="closeModal()">Cancelar</button>
    </div>
  </div>`);
}
function confirmarPag(did){
  const d=D.dividas.find(x=>x.id===did);if(!d)return;
  const v=parseFloat(document.getElementById('ppv').value)||0;
  const dt=document.getElementById('ppdt').value||today();
  d.valorRestante=Math.max(0,(d.valorRestante||0)-v);
  d.parcelaAtual=(d.parcelaAtual||1)+1;
  if(d.valorRestante<=0||d.parcelaAtual>d.parcelas){d.valorRestante=0;d.st='quitado';}
  D.despesas.push({id:_id(),desc:`Parcela — ${d.nome}`,valor:v,data:dt,categoria:'Contas',formaPag:'Transferência'});
  save('dividas');save('despesas');closeModal();render();renderSidebar();
}

function getFaturaAtual(cid){
  const mes=S.mesRef+1,ano=S.anoRef;

  if(!fat){fat={id:_id(),cartaoId:cid,mes,ano,itens:[],paga:false};D.faturas.push(fat);save('faturas');}
  return fat;
}

function sRelatorio(){
  const mes=mesAtual();
  const recMes=D.receitas.filter(r=>r.data.startsWith(mes));
  const despMes=D.despesas.filter(d=>d.data.startsWith(mes));
  const tRec=recMes.reduce((s,r)=>s+r.valor,0);
  const tDesp=despMes.reduce((s,d)=>s+d.valor,0);
  const catDesp={};despMes.forEach(d=>{catDesp[d.categoria]=(catDesp[d.categoria]||0)+d.valor;});
  const catRec={};recMes.forEach(r=>{catRec[r.categoria]=(catRec[r.categoria]||0)+r.valor;});
  const chart=Array.from({length:6},(_,i)=>{
    const d=new Date(S.anoRef,S.mesRef-5+i,1);
    const m=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    return{d:MESES[d.getMonth()].slice(0,3),in:D.receitas.filter(r=>r.data.startsWith(m)).reduce((s,r)=>s+r.valor,0),out:D.despesas.filter(x=>x.data.startsWith(m)).reduce((s,x)=>s+x.valor,0)};
  });
  return`
  <div style="display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap">
    ${navBtns()}
    <div style="margin-left:auto;display:flex;gap:6px">
      <button class="btn btn-g" onclick="expCSV()">${I.dl} CSV</button>
      <button class="btn btn-d" onclick="expPDF()">${I.dl} PDF</button>
    </div>
  </div>
  <div class="kg3">
    <div class="cd" style="padding:16px"><div class="bb" style="font-size:24px;color:var(--ok)">${fmt(tRec)}</div><div style="font-size:11px;color:var(--muted)">Receitas de ${MESES[S.mesRef]}</div></div>
    <div class="cd" style="padding:16px"><div class="bb" style="font-size:24px;color:var(--danger)">${fmt(tDesp)}</div><div style="font-size:11px;color:var(--muted)">Despesas de ${MESES[S.mesRef]}</div></div>
    <div class="cd" style="padding:16px"><div class="bb" style="font-size:24px;color:${tRec-tDesp>=0?'var(--accent)':'var(--danger)'}">${fmt(tRec-tDesp)}</div><div style="font-size:11px;color:var(--muted)">Saldo do Mês</div></div>
  </div>
  <div class="g22" style="margin-bottom:14px">
    <div class="cd" style="padding:18px"><div style="font-weight:600;margin-bottom:10px">💸 Despesas por Categoria</div>${donutChart(Object.entries(catDesp).map(([d,v])=>({d,v})).sort((a,b)=>b.v-a.v))}</div>
    <div class="cd" style="padding:18px"><div style="font-weight:600;margin-bottom:10px">💰 Receitas por Categoria</div>${donutChart(Object.entries(catRec).map(([d,v])=>({d,v})).sort((a,b)=>b.v-a.v))}</div>
  </div>
  <div class="cd" style="padding:18px">
    <div class="hdr"><span style="font-weight:600">Receitas vs Despesas — Últimos 6 Meses</span><div style="font-size:11px;display:flex;gap:8px"><span style="color:var(--ok)">● Receita</span><span style="color:var(--danger)">● Despesa</span></div></div>
    ${barChart(chart)}
  </div>`;
}
function expCSV(){
  const mes=mesAtual();
  const rows=[['Tipo','Data','Descrição','Categoria','Valor','Forma'],...D.receitas.filter(r=>r.data.startsWith(mes)).map(r=>['Receita',r.data,r.desc,r.categoria,r.valor,'']),...D.despesas.filter(d=>d.data.startsWith(mes)).map(d=>['Despesa',d.data,d.desc,d.categoria,d.valor,d.formaPag])];
  const csv='﻿'+rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  const b=new Blob([csv],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`financas-${mes}.csv`;a.click();
}
function expPDF(){
  const mes=mesAtual();
  const rec=D.receitas.filter(r=>r.data.startsWith(mes));
  const desp=D.despesas.filter(d=>d.data.startsWith(mes));
  const tR=rec.reduce((s,r)=>s+r.valor,0),tD=desp.reduce((s,d)=>s+d.valor,0);
  const w=window.open('','_blank');
  w.document.write(`<html><head><title>Relatório ${MESES[S.mesRef]} ${S.anoRef}</title><style>body{font-family:Arial,sans-serif;padding:24px;font-size:12px}h2,h3{margin-bottom:8px}table{width:100%;border-collapse:collapse;margin-bottom:20px}th,td{border:1px solid #ccc;padding:6px 10px;text-align:left}th{background:#f0f0f0}.sum{display:flex;gap:20px;margin-bottom:20px;font-size:14px}@media print{button{display:none}}</style></head><body>
  <h2>Relatório Financeiro — ${MESES[S.mesRef]} ${S.anoRef}</h2>
  <div class="sum"><span>Receitas: <strong>R$ ${fmt2(tR)}</strong></span><span>Despesas: <strong>R$ ${fmt2(tD)}</strong></span><span>Saldo: <strong>R$ ${fmt2(tR-tD)}</strong></span></div>
  <h3>Receitas</h3><table><tr><th>Data</th><th>Descrição</th><th>Categoria</th><th>Valor R$</th></tr>${rec.map(r=>`<tr><td>${r.data}</td><td>${esc(r.desc)}</td><td>${esc(r.categoria)}</td><td>${fmt2(r.valor)}</td></tr>`).join('')}</table>
  <h3>Despesas</h3><table><tr><th>Data</th><th>Descrição</th><th>Categoria</th><th>Forma</th><th>Valor R$</th></tr>${desp.map(d=>`<tr><td>${d.data}</td><td>${esc(d.desc)}</td><td>${esc(d.categoria)}</td><td>${esc(d.formaPag||'')}</td><td>${fmt2(d.valor)}</td></tr>`).join('')}</table>
  <button onclick="window.print()">🖨️ Imprimir / Salvar PDF</button></body></html>`);
  w.document.close();
}

// ── CONFIG ──
function sConfig(){
  const c=D.config;
  return`<div style="max-width:500px">
    <div class="cd" style="padding:20px;margin-bottom:14px">
      <div class="hdr"><span style="font-weight:600">⚙️ Configurações</span></div>
      <div class="frow"><div class="lbl">Nome da Família</div><input class="inp" id="cfn" value="${esc(c.nome||'')}" placeholder="Ex: Família Silva"/></div>
      <div class="frow"><div class="lbl">Cor do Tema</div>
        <div style="display:flex;gap:10px;align-items:center">
          <input type="color" id="cfcor" value="${c.corPrimaria||'#00C875'}" style="width:44px;height:36px;border:none;background:none;cursor:pointer;border-radius:6px" oninput="prevCor(this.value)"/>
          <span style="font-size:12px;color:var(--sub)">Personaliza as cores do sistema</span>
        </div>
      </div>
      <button class="btn" onclick="saveCfg()">💾 Salvar Configurações</button>
    </div>
    <div class="cd" style="padding:20px;margin-bottom:14px">
      <div class="hdr"><span style="font-weight:600">💾 Backup de Dados</span></div>
      <p style="font-size:12px;color:var(--muted);margin-bottom:14px">Exporte e importe todos os seus dados em formato JSON.</p>
      <div style="display:flex;gap:10px;margin-bottom:10px">
        <button class="btn btn-b" style="flex:1;justify-content:center" onclick="exportBkp()">${I.dl} Exportar Backup</button>
        <button class="btn btn-o" style="flex:1;justify-content:center" onclick="document.getElementById('bkf').click()">📂 Importar Backup</button>
      </div>
      <input type="file" id="bkf" accept=".json" style="display:none" onchange="importBkp(this)"/>
      <button class="btn btn-d" style="width:100%;justify-content:center;margin-top:4px" onclick="resetTudo()">🗑️ Apagar Todos os Dados</button>
    </div>
    <div class="cd" style="padding:14px;text-align:center">
      <div style="font-size:11px;color:var(--muted)">Dados salvos localmente no navegador via localStorage<br/>Exporte regularmente para não perder seus registros.</div>
    </div>
  </div>`;
}
function prevCor(c){document.documentElement.style.setProperty('--accent',c);document.documentElement.style.setProperty('--aB',hexRgba(c,.1));}
function saveCfg(){
  D.config.nome=document.getElementById('cfn').value.trim()||'Família';
  D.config.corPrimaria=document.getElementById('cfcor').value;
  save('config');applyTheme();
  document.getElementById('sb-nome').textContent=D.config.nome;
  alert('✅ Configurações salvas!');
}
function exportBkp(){const b=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`financas-backup-${today()}.json`;a.click();}
function importBkp(input){const f=input.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{try{const nd=JSON.parse(e.target.result);Object.keys(nd).forEach(k=>{D[k]=nd[k];DB.set(k,nd[k]);});applyTheme();renderSidebar();render();alert('✅ Backup importado com sucesso!');}catch{alert('Arquivo JSON inválido.');}};r.readAsText(f);}
function resetTudo(){if(confirm('Apagar TODOS os dados? Esta ação não pode ser desfeita.')&&confirm('Confirmação final — todos os registros serão removidos.')){['config','receitas','despesas','dividas','invest','cartoes','faturas'].forEach(k=>DB.del(k));D=loadData();applyTheme();renderSidebar();render();}}

// ── RENDER ──
const SCR={dashboard:sDashboard,receitas:sReceitas,despesas:sDespesas,dividas:sDividas,invest:sInvest,cartao:sCartao,relatorio:sRelatorio,config:sConfig};
function render(){document.getElementById('ct').innerHTML=SCR[S.screen]?SCR[S.screen]():'';}

applyTheme();renderSidebar();render();updateTbMes();
</script>
</body>
</html>
